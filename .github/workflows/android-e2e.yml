name: android-e2e

# Metro-LESS mobile E2E for the agent flows, on a Linux runner.
#
# WHY this exists: interactive mobile E2E against the Metro dev server on Windows is the
# worst-case setup — Metro (a Node process) OOM-crashes after ~1-2 agent /run calls, and the
# Windows/HyperV emulator can't reach the host on 10.0.2.2 (forcing adb-reverse hacks). This
# workflow removes BOTH variables: it runs an EMBEDDED-bundle APK (no Metro) against the
# CONTAINERIZED BFF + gateway, on a Linux emulator (KVM, working 10.0.2.2), the same way the
# web dev-container E2E already works.
#
# Architecture (mirrors the web dev-container + containerized-gateway path):
#   APK (embedded JS, BFF URL → 10.0.2.2:8082) ──► mcm-bff-dev container (:8082)
#                                                     └─► agent-gateway container ─► movie-mcp/web-api-mcp ─► mc-service
#   Keycloak / Redis / Mongo / mc-service all run as containers on the runner.
#
# STATUS: DRAFT skeleton. Two repo-specific deltas are called out with `# TODO(e2e):` and must be
# resolved in one iteration before this goes green (embedded-bundle build mode + agent stack wiring
# on CI). It is intentionally manual-trigger only until then.

on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'Agent model provider (anthropic recommended in CI; ollama needs a model pull)'
        type: choice
        options: [anthropic, ollama]
        default: anthropic
  # Enable once green:
  # pull_request:
  #   paths: ['frontend/mcm-app/**', 'agents/**', 'mcp-servers/**', 'backend/mc-service/**', '.github/workflows/android-e2e.yml']

concurrency:
  group: android-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile-agent-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      # EXPO_PUBLIC_* are inlined into the JS bundle at build time (src/config/bff-url.ts,
      # config/keycloak.ts). On a Linux emulator 10.0.2.2 = the runner host, so the APK reaches
      # the containerized BFF/Keycloak directly — no adb reverse, no Metro.
      EXPO_PUBLIC_BFF_NATIVE_URL: http://10.0.2.2:8082
      EXPO_PUBLIC_KEYCLOAK_NATIVE_URL: http://10.0.2.2:8099
      E2E_BFF_TARGET: dev-container
      E2E_AGENT_PRODUCTION: '1'
      MODEL_PROVIDER: ${{ github.event.inputs.provider || 'anthropic' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      # The agent images + Android SDK/NDK + Gradle caches exhaust the default runner disk
      # (same lesson as android-apk.yml). Free space BEFORE building.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          docker image prune -af || true
          df -h

      - name: Enable KVM (hardware-accelerated emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Backend + agent stack (containers) ────────────────────────────────────────────────
      - name: First-time docker setup (networks + volumes)
        run: |
          for n in backend-network keycloak-network agent-mcp; do docker network create "$n" || true; done
          for v in mc-service_mc-db-data localdev-auth_keycloak-db-data mcm-redis-data; do docker volume create "$v" || true; done

      - name: Bring up Keycloak + Redis + Mongo + mc-service
        run: docker compose --profile app --profile keycloak up -d --wait

      - name: Seed E2E test realm + fixtures
        run: |
          # Reuse the existing E2E global-setup fixture seeding (BROWSE/MUTATION/DEFAULT + movies).
          # TODO(e2e): confirm the exact seeding entrypoint — the web suite seeds via
          # tests/e2e/web/setup/global-setup.ts; expose a standalone `nx run mcm-app:e2e-seed`
          # or call the same helper here so the APK run has the fixtures it asserts against.
          echo "TODO(e2e): seed fixtures + ensure the mcm-bff-test ROPC client / test user exist"

      - name: Build BFF image + start dev BFF container (:8082)
        run: |
          pnpm nx docker-build mcm-app
          docker compose --profile bff-dev up -d --wait
          # The agent-e2e dev BFF relaxes the per-user cost ceiling + rate limit so a multi-turn
          # agent flow isn't gated (compose.agent-e2e.yaml — see CLAUDE.md / SC-011 note).

      - name: Bring up containerized agent gateway + MCP (production nodes)
        run: |
          # Reuses the committed agent stack. anthropic provider avoids a ~19GB Ollama pull in CI.
          MODEL_PROVIDER="$MODEL_PROVIDER" pnpm nx up-agents-prod infrastructure-as-code
          # Publish the private gateway to the emulator host on :8123 (BFF forwards /run there on the
          # native path). scripts/agent-e2e.mjs already documents this socat-proxy pattern.
          # TODO(e2e): confirm whether the dev-container BFF reaches the gateway by docker-DNS
          # (agent-gateway:8000) — if so the :8123 host proxy is only needed for the Metro path and
          # can be dropped here (the APK talks to the BFF, the BFF talks to the gateway).

      # ── Build the standalone (Metro-less) APK ─────────────────────────────────────────────
      - name: Build embedded-bundle E2E APK
        env:
          APK_ABI: x86_64          # emulator ABI only → faster build
        run: |
          # TODO(e2e): the existing scripts/build-apk.mjs runs `:app:assembleDebug`, which still
          # loads JS from Metro. For a standalone E2E APK the JS bundle must be EMBEDDED. Add a
          # release/embedded mode to build-apk.mjs (gradle `:app:assembleRelease` with the bundle,
          # debug-signed for testing) OR set the debug variant to bundle-in-debug. The EXPO_PUBLIC_*
          # env above is inlined at this step.
          pnpm nx run mcm-app:build-apk   # ← switch to the embedded/release variant
          echo "APK_PATH=$(find frontend/mcm-app/android -name '*.apk' -path '*outputs*' | head -1)" >> "$GITHUB_ENV"

      # ── Emulator + Maestro ────────────────────────────────────────────────────────────────
      - name: Install Maestro
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run agent E2E flows on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install -r "$APK_PATH"
            # Credentials for _login-helper come from CI secrets (NOT the local .env.e2e.local).
            export E2E_TEST_USER='${{ secrets.E2E_TEST_USER }}'
            export E2E_TEST_PASSWORD='${{ secrets.E2E_TEST_PASSWORD }}'
            # Run the agent flows ISOLATED per file (CLAUDE.md: the parallel suite trips the
            # per-user rate-limit + token-expiry). Fail the job if any flow fails.
            set -e
            for flow in agent-search agent-card-navigate agent-disambiguation agent-navigate-movie; do
              maestro test "frontend/mcm-app/tests/e2e/mobile/$flow.yaml" \
                --env E2E_TEST_USER="$E2E_TEST_USER" --env E2E_TEST_PASSWORD="$E2E_TEST_PASSWORD"
            done

      - name: Upload Maestro artifacts (screenshots + hierarchy) on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-debug
          path: ~/.maestro/tests/**
          if-no-files-found: ignore

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose --profile app --profile keycloak --profile bff-dev logs --tail=200 || true
          docker logs agent-gateway --tail=200 || true
