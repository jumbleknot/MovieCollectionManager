name: android-e2e

# Metro-LESS mobile E2E for the agent flows, on a Linux runner.
#
# WHY this exists: interactive mobile E2E against the Metro dev server on Windows is the
# worst-case setup — Metro (a Node process) OOM-crashes after ~1-2 agent /run calls, and the
# Windows/HyperV emulator can't reach the host on 10.0.2.2 (forcing adb-reverse hacks). This
# workflow removes BOTH variables: a standalone (embedded-bundle) APK — no Metro — runs against
# the CONTAINERIZED BFF + gateway, on a Linux emulator (KVM, working 10.0.2.2), the same way the
# web dev-container E2E already works.
#
# Architecture (mirrors the web dev-container + containerized-gateway path):
#   APK (embedded JS, BFF URL -> 10.0.2.2:8082) --> mcm-bff-dev container (:8082)
#                                                     `-> agent-gateway container -> movie-mcp/web-api-mcp -> mc-service
#   Keycloak / Redis / Mongo / mc-service all run as containers on the runner. The dev-container
#   BFF reaches the gateway by docker DNS (agent-gateway:8000) — the same path the web
#   agent-search E2E uses — so NO host :8123 socat proxy is needed here (that was Metro-only).
#
# Prereqs (repo settings): secrets ANTHROPIC_API_KEY, E2E_TEST_USER, E2E_TEST_PASSWORD; the test
# user must exist in the Keycloak realm with the mc-user role (same precondition as web E2E).

on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'Agent model provider (anthropic recommended in CI; ollama needs a model pull)'
        type: choice
        options: [anthropic, ollama]
        default: anthropic
  # Enable once it has gone green at least once via workflow_dispatch:
  # pull_request:
  #   paths: ['frontend/mcm-app/**', 'agents/**', 'mcp-servers/**', 'backend/mc-service/**', '.github/workflows/android-e2e.yml']

concurrency:
  group: android-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile-agent-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      # EXPO_PUBLIC_* are inlined into the JS bundle at build time (src/config/bff-url.ts,
      # config/keycloak.ts). On a Linux emulator 10.0.2.2 = the runner host, so the standalone APK
      # reaches the containerized BFF/Keycloak directly — no adb reverse, no Metro.
      EXPO_PUBLIC_BFF_NATIVE_URL: http://10.0.2.2:8082
      EXPO_PUBLIC_KEYCLOAK_NATIVE_URL: http://10.0.2.2:8099
      E2E_BFF_TARGET: dev-container
      E2E_AGENT_PRODUCTION: '1'
      MODEL_PROVIDER: ${{ github.event.inputs.provider || 'anthropic' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      E2E_TEST_USER: ${{ secrets.E2E_TEST_USER }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      # The agent images + Android SDK/NDK + Gradle caches exhaust the default runner disk
      # (same lesson as android-apk.yml). Free space BEFORE building.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          docker image prune -af || true
          df -h

      - name: Enable KVM (hardware-accelerated emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm

      # The repo's root compose.yaml `include:`s the per-service compose files AND re-declares some
      # services in the top-level `services:` block to attach profiles (e.g. mc-service: profiles:
      # [app]). Overriding an included service this way needs a recent Docker Compose; the runner's
      # bundled version rejects it ("services.mc-service conflicts with imported resource"). Install
      # the latest Compose plugin so it matches the local dev version.
      - name: Install latest Docker Compose plugin
        run: |
          mkdir -p ~/.docker/cli-plugins
          curl -fsSL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 \
            -o ~/.docker/cli-plugins/docker-compose
          chmod +x ~/.docker/cli-plugins/docker-compose
          docker compose version

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Backend + agent stack (containers) ────────────────────────────────────────────────
      - name: First-time docker setup (networks + volumes)
        run: |
          for n in backend-network keycloak-network agent-mcp; do docker network create "$n" || true; done
          for v in mc-service_mc-db-data localdev-auth_keycloak-db-data mcm-redis-data; do docker volume create "$v" || true; done

      # ⚠️ BLOCKED (first-run finding 2026-06-13): the stack needs environment provisioning that
      # only exists on a dev box (manual first-time setup) and is gitignored:
      #   - infrastructure-as-code/docker/keycloak/.env.local  (+ secrets/keycloak_db_password.txt)
      #   - frontend/mcm-app/.env.docker                       (BFF + Keycloak client secrets)
      #   - a `jumbleknot` realm with its clients + GENERATED client secrets + the test user
      # There is no committed realm export, and the client secrets are generated by Keycloak then
      # hand-copied locally. TODO(ci-provisioning): add a step that (a) writes the env/secret files
      # (CI test values), (b) imports a committed Keycloak realm export (realm + clients + known
      # test secrets + the test user with mc-user), then bring the stack up. This is its own infra
      # task — see specs/013-post-agent-enhancements/diagnosis-mobile-agent-no-token.md "CI status".
      - name: Bring up Keycloak + Redis + Mongo + mc-service
        run: docker compose --profile app --profile keycloak up -d --wait

      - name: Build BFF image + start dev BFF container (:8082)
        run: |
          pnpm nx docker-build mcm-app
          docker compose --profile bff-dev up -d --wait
          # compose.agent-e2e.yaml relaxes the per-user cost ceiling + rate limit on the dev BFF so
          # a multi-turn agent flow isn't gated (CLAUDE.md / SC-011).

      - name: Bring up containerized agent gateway + MCP (production nodes)
        run: |
          # anthropic provider avoids a ~19 GB Ollama pull in CI. Builds the 3 images, joins the
          # agent-mcp network, fetches the gateway client secret, verifies production nodes.
          MODEL_PROVIDER="$MODEL_PROVIDER" pnpm nx up-agents-prod infrastructure-as-code

      # ── Seed fixtures (reuses the proven web E2E global-setup: PKCE login + BROWSE/MUTATION/
      #    DEFAULT collections + FIXTURE_MOVIES, for the same E2E_TEST_USER the mobile flows log in
      #    as). Runs against the container BFF on :8082. ────────────────────────────────────────
      - name: Install Playwright browser (for the seeding login)
        run: pnpm --filter mcm-app exec playwright install --with-deps chromium
      - name: Seed fixtures via web global-setup
        working-directory: frontend/mcm-app
        run: |
          # Running ANY single web spec triggers playwright globalSetup, which logs in once and
          # verifies/creates the fixture dataset (tests/e2e/web/setup/global-setup.ts). We grep a
          # single fast, stable test purely to drive the seed; --forbid-only off, retries on.
          E2E_BFF_TARGET=dev-container pnpm exec playwright test tests/e2e/web/auth.spec.ts \
            -g "shows the login screen" --retries=1 || \
          E2E_BFF_TARGET=dev-container pnpm exec playwright test tests/e2e/web/auth.spec.ts --retries=1 --max-failures=1
          # NOTE: if no single grep is stable, drop the `-g` and let the first auth test seed.

      # ── Build the standalone (Metro-less) APK ─────────────────────────────────────────────
      - name: Build embedded-bundle E2E APK (release variant = embedded JS)
        working-directory: frontend/mcm-app
        env:
          APK_VARIANT: release   # release embeds the JS bundle -> standalone, no Metro
          APK_ABI: x86_64        # emulator ABI only -> faster build
        run: |
          pnpm nx run mcm-app:build-apk
          echo "APK_PATH=$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)" >> "$GITHUB_ENV"

      # ── Emulator + Maestro ────────────────────────────────────────────────────────────────
      - name: Install Maestro
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run agent E2E flows on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install -r "$APK_PATH"
            set -e
            # Run the agent flows ISOLATED per file (CLAUDE.md: the parallel suite trips the
            # per-user rate-limit + token-expiry). A single failure fails the job.
            for flow in agent-search agent-card-navigate agent-disambiguation agent-navigate-movie; do
              echo "=== flow: $flow ==="
              maestro test "frontend/mcm-app/tests/e2e/mobile/$flow.yaml" \
                --env E2E_TEST_USER="$E2E_TEST_USER" --env E2E_TEST_PASSWORD="$E2E_TEST_PASSWORD"
            done

      - name: Upload Maestro artifacts (screenshots + hierarchy) on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-debug
          path: ~/.maestro/tests/**
          if-no-files-found: ignore

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose --profile app --profile keycloak --profile bff-dev logs --tail=200 || true
          docker logs agent-gateway --tail=200 || true
