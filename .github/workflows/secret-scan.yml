name: secret-scan

# Feature 018 (T049, FR-025 / NFR-Sec-4 / SC-006): fail the build if a credential-shaped string
# (Anthropic key, TMDB v3/v4 token) is committed anywhere, or if a golden cassette carries an auth
# header / api-key field. Per-user secrets are encrypted at rest and injected per-run in memory —
# none should ever land in a committed file. Runs repo-wide on every push / PR (no path filter).

on:
  workflow_dispatch: {}
  push:
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
      - name: Validate the scanner detects planted keys (and clean tree passes)
        run: node scripts/secret-scan.mjs --selftest
      - name: Scan committed files for credential-shaped strings
        run: node scripts/secret-scan.mjs
