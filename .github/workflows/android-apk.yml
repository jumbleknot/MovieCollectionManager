name: android-apk

# Builds the Android debug APK on a Linux runner and publishes it as an artifact.
# A Linux runner structurally avoids the Windows CMAKE_OBJECT_PATH_MAX (250) wall that
# the local Windows build must work around (see scripts/build-apk-short-path.ps1).
# Scope: APK build + artifact ONLY — no test suites run here (feature 006, FR-011).
# The build itself is invoked through the Nx target `mcm-app:build-apk` (constitution:
# all build ops run through Nx), keeping this workflow thin and provider-portable.

on:
  workflow_dispatch: {}
  push:
    paths:
      - 'frontend/mcm-app/android/**'
      - 'frontend/mcm-app/app.json'
      - 'frontend/mcm-app/package.json'
      - 'frontend/mcm-app/scripts/build-apk.mjs'
      - '.github/workflows/android-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The RN 0.85 C++ native modules (react-native-worklets, react-native-screens) +
      # Android SDK/NDK + Gradle caches exhaust the default runner disk, which kills the
      # build mid-compile (no clean error, step stuck "in_progress"). Free ~10-15 GB of
      # preinstalled toolchains we don't use, without touching the Android SDK.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/share/swift /usr/local/share/powershell /usr/local/lib/node_modules || true
          df -h /

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: pnpm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Android APK (Nx target)
        run: pnpm nx run mcm-app:build-apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: frontend/mcm-app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
