# RETIRED (feature 020): the single-project root aggregator has been split into four
# independently operable named Compose stacks. There is no longer one `mcm` project that
# bundles everything behind profiles — bring up only the stack(s) you need.
#
# Stacks (each its own Compose project, in infrastructure-as-code/docker/stacks/):
#   auth           → keycloak-service + keycloak-store-postgres + keycloak-mailpit (+ vault-service, --profile vault)
#   mcm            → mc-service + its stores + the BFF + the agent layer (profiles: app / bff-nonsecure / bff-secure / agents / agents-metro)
#   audit          → agent-audit-opensearch (append-only sink)
#   observability  → LangFuse + otel-lgtm + opa-service + unleash-service
#
# Bring-up (Nx, from repo root):
#   pnpm nx up-auth infrastructure-as-code            # Keycloak (bring up BEFORE mcm app — FR-006, no cross-project depends_on)
#   pnpm nx up-mcm infrastructure-as-code             # test infra + mc-service (--profile app)
#   pnpm nx up-audit infrastructure-as-code
#   pnpm nx up-observability infrastructure-as-code
#   pnpm nx up-all infrastructure-as-code             # auth then mcm app, in order
#   pnpm nx down-mcm / down-auth / down-audit / down-observability / down-all
#
# Or directly, e.g. the web-E2E dev-container path:
#   docker compose -p mcm -f infrastructure-as-code/docker/stacks/mcm.compose.yaml --profile bff-nonsecure up -d
#
# NOTE: the former cross-stack health-gate (mc-service → keycloak-service) is intentionally
# dropped — Docker Compose has no cross-project depends_on. Order the stacks manually: auth first.
#
# Naming gate: scripts/check-resource-naming.mjs (features 019 + 020).
