# SAST/SCA finding allowlist — feature 033 (see specs/033-sast-semgrep/data-model.md).
#
# Consumed ONLY by the gate (scripts/check-sast-findings.mjs). Suppresses a matching finding from the
# blocking gate while it stays VISIBLE in security/sast/reports/findings.json (FR-010). The gate fails
# only on `blocking` findings (High/Critical that are SAST, or runtime-scope SCA); Medium/Low and
# dev-scope findings are warnings and need no entry here.
#
# Match key (all four required; a blank justification/addedBy or invalid regex is a GATE ERROR):
#   - scanner:         semgrep | cargo-audit | pnpm-audit | pip-audit
#     id:              exact rule id (Semgrep check_id) or advisory id (RUSTSEC-*/GHSA-*/CVE-*/PYSEC-*)
#     locationPattern: regex vs Finding.location ('path:line' with FORWARD slashes, or 'package@version')
#     justification:   why accepted (false positive or accepted risk)
#     addedBy:         who triaged
#     expiry:          optional ISO YYYY-MM-DD — once past, the entry stops suppressing (finding re-blocks)
#
# ═════════════════════════════════════════════════════════════════════════════════════════════════
# BASELINE (FR-012 / SC-006): every entry below suppresses a finding that was ALREADY PRESENT when
# feature 033 landed. Seeding them makes the protected `main` green on day one, so the gate blocks
# only findings introduced AFTER this baseline. None of these were introduced by this feature.
# ═════════════════════════════════════════════════════════════════════════════════════════════════

# ── SAST: custom-rule findings in unit-test code (false positives) ───────────────────────────────
# The mcm-* rules fire on test files that deliberately construct the flagged pattern to test it —
# token-shaped fixtures that verify the logger's redaction, and mc-service client construction in
# isolation. Test code, not production server code. Scoped to the unit-tests dir.
- scanner: "semgrep"
  id: "security.sast.rules.mcm-no-token-logging"
  locationPattern: "frontend/mcm-app/src/bff-server/unit-tests/.*"
  justification: "False positive: unit-test files pass token/session/email-shaped fixtures to the logger specifically to assert redaction (logger.test.ts, audit-sink.test.ts). Not production logging."
  addedBy: "steve"
- scanner: "semgrep"
  id: "security.sast.rules.mcm-auth-before-authz"
  locationPattern: "frontend/mcm-app/src/bff-server/unit-tests/.*"
  justification: "False positive: mc-service-client.test.ts constructs createMcServiceClient directly to unit-test the client in isolation; auth ordering is exercised at the route/integration layer, not in these unit tests."
  addedBy: "steve"

# ── SAST: community-pack findings (pre-existing) ─────────────────────────────────────────────────
- scanner: "semgrep"
  id: "javascript.node-crypto.security.gcm-no-tag-length.gcm-no-tag-length"
  locationPattern: "frontend/mcm-app/src/bff-server/agent-config-crypto\\.ts:.*"
  justification: "False positive: AES-256-GCM auth tag is a fixed 16 bytes (TAG_BYTES) — sliced explicitly from the blob and verified via setAuthTag() before decipher.final(). Node's default GCM tag length is already 128-bit; there is no short-tag exposure."
  addedBy: "steve"
# dockerfile.security.missing-user — REMEDIATED in feature 034 (US2): all five app-tier images
# (frontend/mcm-app, agents/movie-assistant, the three mcp-servers) now drop to a non-root USER
# before CMD, matching backend/mc-service. Entry deleted so a regression re-blocks.
- scanner: "semgrep"
  id: "yaml.github-actions.security.gha-curl-pipe-shell.gha-curl-pipe-shell"
  locationPattern: "\\.forgejo/workflows/.*\\.yml:.*"
  justification: "Accepted CI bootstrap: pipes the pinned astral.sh uv installer to sh — the same fixed, non-attacker-controlled installer URL already used by the agent-gates guardrails job. Pre-existing at baseline."
  addedBy: "steve"
# run-shell-injection — REMEDIATED in feature 034 (US3): all six flagged workflow run-steps were
# refactored to pass the interpolated ${{ … }} value through a step `env:` block and reference it as a
# quoted shell variable (the GitHub-documented mitigation). Zero findings remain; entry deleted.

# ── SCA: runtime dependency advisories — REMEDIATED in feature 034 (US1) ─────────────────────────
# All 18 pre-existing runtime SCA advisories (Rust crossbeam-epoch, JS form-data/hono/undici,
# Python aiohttp×8/langchain/pydantic-settings/langsmith/cryptography/starlette×2) were fixed by
# lockfile version bumps and their allowlist entries DELETED, so a regression re-blocks. A fresh
# full scan confirms zero blocking SCA findings remain (undici's residual hits are now dev-scope on
# the 7.x copy — non-blocking, tracked under P4). See docs/proposals/sast-sca-hardening-backlog.md.

# ── SCA: not-exploitable runtime advisory (post-034, expiring) ───────────────────────────────────
# click PYSEC-2026-2132 is a command injection in click.edit() (it shells out to $EDITOR). The agent
# and MCP servers NEVER call click.edit() — click is a transitive-only dependency (no `import click`
# anywhere under agents/ or mcp-servers/), pulled by CLI/server tooling. It is pinned at 8.2.0 by a
# deep transitive cap that currently blocks the click>=8.3.3 fix (bumping typer/uvicorn did not free
# it). Accepted as not-exploitable with an expiry so it re-blocks if the cap frees (bump then) or the
# risk profile changes. pillow's advisories (PYSEC-2026-2253..2257) were REMEDIATED (→12.3.0), not
# allowlisted — this is the one advisory that cannot be bumped today.
- scanner: "pip-audit"
  id: "PYSEC-2026-2132"
  locationPattern: "click@.*"
  justification: "Not exploitable: the vuln is in click.edit() (spawns $EDITOR), never called by the agent/MCP runtime; click is transitive-only (no import in our source) and pinned at 8.2.0 by a transitive cap blocking the click>=8.3.3 fix. Re-evaluate at expiry or when the cap frees."
  addedBy: "steve"
  expiry: "2026-10-12"
