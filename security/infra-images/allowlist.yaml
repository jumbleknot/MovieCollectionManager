# Infra-image CVE finding allowlist — feature 035 (see specs/035-infra-image-cve-scan/data-model.md).
#
# Consumed ONLY by the gate (scripts/check-infra-image-findings.mjs). Suppresses a matching finding
# from the blocking gate while it stays VISIBLE in security/infra-images/reports/findings.json. The
# gate fails only on `blocking` findings (FIXABLE Critical — matching the cd-deploy Trivy gate);
# fixable High and everything else (unfixable, Medium, Low) are non-blocking warnings.
#
# Match key (all four required; a blank field or invalid regex is a GATE ERROR):
#   - image:           regex vs Finding.image (the scanned repo:tag)
#     id:              regex vs advisory id (CVE-*/GHSA-*)
#     justification:   why accepted — usually "awaiting Renovate base-image bump to <fixed tag>"
#     addedBy:         who triaged
#     expiry:          optional ISO YYYY-MM-DD — once past, the entry stops suppressing (re-blocks)
#
# ═════════════════════════════════════════════════════════════════════════════════════════════════
# BASELINE (seeded 2026-07-11 from the first Linux/CI Trivy scan — Trivy is not on the Windows dev
# box). Every entry below is a pre-existing FIXABLE Critical present at seeding; `main` is green on
# day one and the gate thereafter blocks only NEW fixable-Critical findings. Remediation is a Renovate
# base-image bump; delete the entry after the bump so a regression re-blocks. Fixable HIGH CVEs (851 at
# seeding) are report-only warnings (base OS images carry hundreds — gating on those is noise; same
# CRITICAL-only policy as cd-deploy). See security/infra-images/reports/findings.json for the full set.
# ═════════════════════════════════════════════════════════════════════════════════════════════════

