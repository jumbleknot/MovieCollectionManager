name: spreadsheet-mcp

# spreadsheet-mcp MCP server (feature 014) — scoped-capability file processing.
# On backend-network so it can reach the transient store (mcm-redis); the Agent Gateway
# (also on backend-network) is its sole caller. It makes NO backend DOMAIN-service calls
# (no MC_SERVICE_URL, no mc-service client) — Redis is only the transient upload/download
# blob store (014 research R3/R11). No published host port.

services:
  spreadsheet-mcp:
    image: spreadsheet-mcp:latest
    container_name: spreadsheet-mcp
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://mcm-redis:6379
    networks:
      - backend-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

networks:
  backend-network:
    external: true
