name: spreadsheet-mcp

# spreadsheet-mcp MCP server (feature 014) — scoped-capability file processing.
# On backend-network so the Agent Gateway (its sole caller) can reach it, AND on mcm-bff-network
# so it can reach the transient store `mcm-bff-cache-redis` (which lives on mcm-bff-network, NOT
# backend-network). It makes NO backend DOMAIN-service calls (no MC_SERVICE_URL, no mc-service
# client) — Redis is only the transient upload/download blob store (014 research R3/R11).
# (Feature 020: mcm-bff-network added to the compose so the mcm `--profile agents` stack is
# self-sufficient — previously agent-stack.mjs had to `docker network connect` it at runtime.)

services:
  movie-assistant-mcp-spreadsheet:
    image: spreadsheet-mcp:latest
    container_name: movie-assistant-mcp-spreadsheet
    profiles: [agents]   # feature 039 Workstream B: profile lives here, not re-declared in the stack
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://mcm-bff-cache-redis:6379
    networks:
      - backend-network
      - mcm-bff-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

networks:
  backend-network:
    external: true
  mcm-bff-network:
    name: mcm-bff-network
