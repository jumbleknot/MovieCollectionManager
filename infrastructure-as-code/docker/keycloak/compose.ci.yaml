# Feature 023 (T009) — CI-only override that makes Keycloak import the throwaway ci-realm.json on
# boot, so `app-ci` provisions a reproducible realm from a clean volume (FR-006, FR-011, research R5).
#
# Used only in CI, layered onto the auth stack:
#   docker compose -p auth \
#     -f infrastructure-as-code/docker/stacks/auth.compose.yaml \
#     -f infrastructure-as-code/docker/keycloak/compose.ci.yaml up -d --wait
#
# Overriding an `include:`d service like this needs a recent Docker Compose (the runner installs the
# latest plugin — same reason as the android-e2e port).
#
# The realm file is mounted via an ABSOLUTE path from ${CI_REALM_FILE}: Compose resolves a RELATIVE
# volume source against the PROJECT directory (the dir of the first `-f` file = stacks/), not this
# file's dir — so a relative `./ci-realm.json` pointed at a non-existent path and Docker silently
# created an empty *directory* there ("ci-realm.json (Is a directory)"). The workflow sets
# CI_REALM_FILE to the absolute path of the committed throwaway export. Fail-fast if unset.
# No new named volume/network is introduced (resource-naming gate stays green); mounted read-only.
#
# The mount TARGET is `grumpyrobot-realm.json`, not `ci-realm.json`: Keycloak's directory-import
# (`--import-realm` reading data/import/) requires each file be named `<realmName>-realm.json` or it
# aborts with "File name / realm name mismatch". The committed source file stays `ci-realm.json`.
name: auth

services:
  keycloak-service:
    command:
      - start-dev
      - --import-realm
    # Feature 027 (US5): ci-realm.json commits NO secret value — every client secret + the E2E user
    # password is a `${ENV_VAR}` placeholder Keycloak resolves from THIS container env at import
    # (placeholder replacement is default-on since KC 26.0.0). The names are the canonical ones the BFF
    # uses, so realm-secret == BFF-secret == same Forgejo secret. Fail-fast `${VAR:?}` so a missing
    # value aborts the up loudly instead of importing a broken realm. Values come from the app-ci.yml
    # "Bring up Keycloak" step (3 from Forgejo secrets, 3 minted per-run, E2E_TEST_PASSWORD from job env).
    environment:
      E2E_TEST_PASSWORD: "${E2E_TEST_PASSWORD:?set in the app-ci app-e2e job env}"
      KEYCLOAK_CLIENT_SECRET: "${KEYCLOAK_CLIENT_SECRET:?set in the app-ci Bring-up-Keycloak step env}"
      KEYCLOAK_SERVICE_CLIENT_SECRET: "${KEYCLOAK_SERVICE_CLIENT_SECRET:?set in the app-ci Bring-up-Keycloak step env}"
      AGENT_SUBJECT_TOKEN_CLIENT_SECRET: "${AGENT_SUBJECT_TOKEN_CLIENT_SECRET:?set in the app-ci Bring-up-Keycloak step env}"
      AGENT_GATEWAY_CLIENT_SECRET: "${AGENT_GATEWAY_CLIENT_SECRET:?minted per-run in the app-ci Bring-up-Keycloak step}"
      MC_SERVICE_CLIENT_SECRET: "${MC_SERVICE_CLIENT_SECRET:?minted per-run in the app-ci Bring-up-Keycloak step}"
      E2E_ROPC_CLIENT_SECRET: "${E2E_ROPC_CLIENT_SECRET:?minted per-run in the app-ci Bring-up-Keycloak step}"
    volumes:
      - ${CI_REALM_FILE:?set CI_REALM_FILE to the absolute path of ci-realm.json}:/opt/keycloak/data/import/grumpyrobot-realm.json:ro
