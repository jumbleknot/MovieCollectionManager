name: localdev-auth

services:
  keycloak-store-postgres:
    image: postgres:18.3-alpine3.23
    container_name: keycloak-store-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - keycloak-store-postgres-data:/var/lib/postgresql #Environment variable PGDATA changed to version specific (/var/lib/postgresql/18/docker) so volume also changed from /var/lib/postgresql/data
    environment:
      POSTGRES_USER: keycloak
      # Single source of truth (feature 022): same ${KC_DB_PASSWORD} the keycloak-service uses.
      # No file-secret, no .env.local dual-source. Sourced from stacks/auth.env (gen-dev-secrets).
      POSTGRES_PASSWORD: "${KC_DB_PASSWORD:?set in stacks/auth.env (run: node scripts/gen-dev-secrets.mjs)}"
      POSTGRES_DB: keycloak
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "5"
    networks:
      - keycloak-network
    healthcheck:  # Local health check from within the container in local development.
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  keycloak-service:
    depends_on:
      keycloak-store-postgres:
        condition: service_healthy
    image: quay.io/keycloak/keycloak:26.7.0
    container_name: keycloak-service
    restart: unless-stopped
    ports:
      - "127.0.0.1:8099:8080"  # Expose the application port externally on 8099 and restricted to host machine (127.0.0.1).
      #- "127.0.0.1:9000:9000"  # Expose the management port externally for health checks in higher environments, but not in local development.
    logging:
      driver: json-file
      options:
        max-size: "10m"   # Keycloak audit events; ship to persistent store for 90-day retention
        max-file: "10"
    environment:
      # KC_HOSTNAME pins a STABLE token issuer (http://localhost:8099) regardless of which host
      # a request arrives on. This is REQUIRED for the BFF Docker container (feature 007): the
      # browser logs in at localhost:8099 so tokens carry iss=localhost:8099, but the container
      # BFF performs the refresh-token grant over the internal Docker network (keycloak-service:8080).
      # With a dynamic hostname Keycloak validated the refresh token's issuer against the request
      # host and rejected it ("invalid_grant: Invalid token issuer"). Pinning the issuer makes the
      # refresh grant validate from any backchannel host. (Login worked regardless because the
      # authorization_code grant does not validate a pre-issued issuer — only refresh_token does.)
      #
      # KC_HOSTNAME_BACKCHANNEL_DYNAMIC=true keeps the issuer fixed at localhost:8099 while letting
      # BACKCHANNEL endpoint URLs (token, JWKS) resolve from the incoming request, so the container
      # (keycloak-service:8080) and the host (localhost:8099) each reach Keycloak on a reachable URL.
      #
      # Trade-off: the Android emulator must now reach Keycloak at localhost:8099 too (adb reverse
      # tcp:8099) rather than 10.0.2.2:8099 — handled in the mobile container flow.
      KC_HOSTNAME: http://localhost:8099
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: true
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: "${KC_BOOTSTRAP_ADMIN_PASSWORD:?set in stacks/auth.env (run: node scripts/gen-dev-secrets.mjs)}"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-store-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      # Single source of truth (feature 022): same ${KC_DB_PASSWORD} the postgres service initializes
      # with. No file-secret, no .env.local. Sourced from stacks/auth.env (gen-dev-secrets).
      KC_DB_PASSWORD: "${KC_DB_PASSWORD:?set in stacks/auth.env (run: node scripts/gen-dev-secrets.mjs)}"
    command:
      - start-dev  # Use the development mode for faster startup and auto-reload on configuration changes. Not recommended for production use.
    networks:
      - keycloak-network
      - backend-network
    healthcheck:  # Local health check from within the container in local development.  Container image doesn't support curl or wget, so open network connection send HTTP HEAD request and check for successful "HTTP/1.0 200" response.
      test: ["CMD-SHELL", "{ printf 'HEAD /health/ready HTTP/1.0\r\n\r\n' >&0; grep 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/9000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  keycloak-mailpit:
    image: axllent/mailpit:latest
    container_name: keycloak-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    volumes:
      - keycloak-mailpit-data:/data
    environment:
      MP_MAX_MESSAGES: 500
      MP_DATABASE: /data/mailpit.db
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - keycloak-network

networks:
  keycloak-network:
    external: true  # Pre-created: docker network create keycloak-network
  backend-network:  # Allows external services on this network (e.g. backend API) to connect to Keycloak by referencing the service name keycloak-service:8080.
    external: true  # Assumes the network is already created outside of this compose file.

volumes:
  keycloak-store-postgres-data:
    external: true
    name: keycloak-store-postgres-data  # volume owned by this compose; declared external so the stack include: preserves the name
  keycloak-mailpit-data:
    name: keycloak-mailpit-data  # explicit (feature 019): no mcm_ project prefix