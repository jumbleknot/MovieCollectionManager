# Production Control-Tower observability stack (prod-observability) — feature 025 (US2).
# Promotes the dev `--profile observability` stack (observability/compose.yaml) to prod as a Komodo
# ResourceSync stack. Upstream images only — no CI build/scan/digest (like prod-auth). Differences
# from the dev compose.yaml are flagged #PROD.
#
# Components: LangFuse v3 (LLM traces) + otel-lgtm (infra telemetry) + OPA (policy) + Unleash (flags),
# all on the shared backend-network the gateway/BFF already reach.
#
# Networking (R10): internal-only, with ONE carve-out — the two operator UIs (LangFuse web + Grafana)
# are published for tailnet access. They bind to 0.0.0.0 (plain HOST:CONTAINER), NOT the tailnet IP:
# the rootless daemon starts before tailscaled at boot, so a `${TS_ADMIN_IP}:host:container` bind
# silently fails (rootlesskit never learns the tailnet IP → empty Ports, nothing listening). Tailnet-only
# exposure is preserved by the host ufw default-deny on all non-tailnet inbound. These are the ONLY
# published ports in the whole feature; every other service is unpublished. (feature 028)
#
# Secrets: every credential is fail-fast ${VAR:?}; real values are masked Komodo Variables written to
# the gitignored .env.prod. No inline literal, no ${VAR:-literal} default. TAILNET_HOST is an existing
# prod-auth Variable (topology, not a secret) reused below; TS_ADMIN_IP is no longer used for the binds
# (feature 028) and may be retired as a Variable.
#
# Note on vendor image tags: the pinned-in-plan images carry explicit tags; the vendor-bundle tools
# (otel-lgtm, opa, unleash, minio/mc) mirror the dev-proven tags — digest-pin them on the host once
# validated. opa uses the `-debug` variant so its busybox shell can run the /health wget healthcheck.
name: prod-observability
services:
  # ── LangFuse v3 ───────────────────────────────────────────────────────────────────────────
  langfuse-web:
    image: langfuse/langfuse:3
    container_name: langfuse-web
    restart: unless-stopped
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
    ports:
      # #PROD tailnet-only operator UI (R10) — bound to 0.0.0.0 (not the tailnet IP, which fails the
      # rootless-before-tailscaled boot race); tailnet-only via host ufw default-deny. (feature 028)
      - "3030:3000"
    environment: &langfuse-env
      DATABASE_URL: "postgresql://langfuse:${LANGFUSE_PG_PASSWORD:?set in .env.prod}@langfuse-postgres:5432/langfuse"
      SALT: "${LANGFUSE_SALT:?set in .env.prod}"
      ENCRYPTION_KEY: "${LANGFUSE_ENCRYPTION_KEY:?set in .env.prod}"
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: "${LANGFUSE_CLICKHOUSE_PASSWORD:?set in .env.prod}"
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: "6379"
      REDIS_AUTH: "${LANGFUSE_REDIS_PASSWORD:?set in .env.prod}"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: "${LANGFUSE_MINIO_ROOT_PASSWORD:?set in .env.prod}"
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: "${LANGFUSE_MINIO_ROOT_PASSWORD:?set in .env.prod}"
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      # #PROD login/callback over the tailnet host, not localhost (operator reaches it via the tailnet).
      NEXTAUTH_URL: "http://${TAILNET_HOST:?set in .env.prod (existing prod-auth Komodo Variable)}:3030"
      NEXTAUTH_SECRET: "${LANGFUSE_NEXTAUTH_SECRET:?set in .env.prod}"
      # Deterministic bootstrap — known org/project + API keys for the gateway consumer (same values).
      LANGFUSE_INIT_ORG_ID: mcm
      LANGFUSE_INIT_ORG_NAME: MCM
      LANGFUSE_INIT_PROJECT_ID: movie-assistant
      LANGFUSE_INIT_PROJECT_NAME: movie-assistant
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: "${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:?set in .env.prod}"
      LANGFUSE_INIT_PROJECT_SECRET_KEY: "${LANGFUSE_INIT_PROJECT_SECRET_KEY:?set in .env.prod}"
      LANGFUSE_INIT_USER_EMAIL: dev@example.com
      LANGFUSE_INIT_USER_NAME: MCM Admin
      LANGFUSE_INIT_USER_PASSWORD: "${LANGFUSE_INIT_USER_PASSWORD:?set in .env.prod}"
    networks:
      - backend-network
    logging: &obs-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: langfuse-worker
    restart: unless-stopped
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-minio-init:
        condition: service_healthy   # #PROD healthy = bucket created (ready-marker); init now stays alive
    environment: *langfuse-env
    networks:
      - backend-network
    logging: *obs-logging

  langfuse-postgres:
    image: postgres:16-alpine
    container_name: langfuse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: "${LANGFUSE_PG_PASSWORD:?set in .env.prod}"
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-pg-data:/var/lib/postgresql/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *obs-logging

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: langfuse-clickhouse
    restart: unless-stopped
    # #PROD hard memory cap (R5) — ClickHouse is the biggest RAM consumer; 24.3 is cgroup-aware, so a
    # container mem_limit bounds its internal max_server_memory_usage (default 0.9 ratio of the limit).
    mem_limit: 4g
    environment:
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: "${LANGFUSE_CLICKHOUSE_PASSWORD:?set in .env.prod}"
    user: "101:101"
    volumes:
      - langfuse-clickhouse-data:/var/lib/clickhouse
      - langfuse-clickhouse-logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *obs-logging

  langfuse-redis:
    image: redis:7-alpine
    container_name: langfuse-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${LANGFUSE_REDIS_PASSWORD:?set in .env.prod}"]
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${LANGFUSE_REDIS_PASSWORD:?set in .env.prod}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *obs-logging

  langfuse-minio:
    image: minio/minio
    container_name: langfuse-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: "${LANGFUSE_MINIO_ROOT_PASSWORD:?set in .env.prod}"
    volumes:
      - langfuse-minio-data:/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *obs-logging

  # Create the `langfuse` bucket (LangFuse v3 does NOT auto-create it), then STAY ALIVE idling so Komodo's
  # stack-health doesn't count an exited container as unhealthy (same as agent-audit-init in prod-audit).
  # #PROD it touches a ready-marker AFTER the bucket exists and its healthcheck gates on that marker, so
  # langfuse-worker can depend on `service_healthy` (below) instead of `service_completed_successfully`
  # (which a never-exiting container would never satisfy).
  langfuse-minio-init:
    image: minio/mc
    container_name: langfuse-minio-init
    restart: unless-stopped
    depends_on:
      langfuse-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://langfuse-minio:9000 minio ${LANGFUSE_MINIO_ROOT_PASSWORD:?set in .env.prod} &&
      mc mb --ignore-existing local/langfuse &&
      touch /tmp/ready &&
      echo 'langfuse bucket ready' &&
      exec sleep infinity"
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - backend-network
    logging: *obs-logging

  # ── OpenTelemetry backend (Tempo + Prometheus + Loki + Grafana, single container) ──────────
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: otel-lgtm
    restart: unless-stopped
    ports:
      # #PROD tailnet-only Grafana UI (R10) — bound to 0.0.0.0 (not the tailnet IP, which fails the
      # rootless-before-tailscaled boot race); tailnet-only via host ufw default-deny. The OTLP
      # :4317/:4318 ports stay UNpublished — the gateway reaches them by internal DNS (otel-lgtm:4318).
      # Grafana is the only exposed port here. (feature 028)
      - "3002:3000"
    volumes:
      - otel-lgtm-data:/data
    networks:
      - backend-network
    healthcheck:
      # #PROD otel-lgtm is ubuntu-based (has bash but /bin/sh is dash → invoke bash for /dev/tcp).
      # A TCP open on Grafana :3000 is the readiness signal.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/3000' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *obs-logging

  # ── Open Policy Agent — agent authorization decisions (token-exchange + UI-action) ──────────
  opa-service:
    # #PROD `-debug` variant: distroless `opa` has no shell; -debug adds busybox so the /health
    # healthcheck (and Komodo status) works. Policies already `import rego.v1` (OPA 1.x compatible).
    image: openpolicyagent/opa:latest-debug
    container_name: opa-service
    restart: unless-stopped
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "--watch"
      - "/policies"
    volumes:
      - ../../opa/policies:/policies:ro
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8181/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging: *obs-logging

  # ── Unleash — agent feature flags / kill-switch ─────────────────────────────────────────────
  unleash-service:
    image: unleashorg/unleash-server:latest
    container_name: unleash-service
    restart: unless-stopped
    depends_on:
      unleash-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://unleash:${UNLEASH_PG_PASSWORD:?set in .env.prod}@unleash-postgres:5432/unleash"
      DATABASE_SSL: "false"
      INIT_ADMIN_API_TOKENS: "${UNLEASH_ADMIN_TOKEN:?set in .env.prod}"
      INIT_CLIENT_API_TOKENS: "${UNLEASH_CLIENT_TOKEN:?set in .env.prod}"
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4242/health"]
      interval: 10s
      timeout: 5s
      retries: 15
    logging: *obs-logging

  unleash-postgres:
    image: postgres:16-alpine
    container_name: unleash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: unleash
      POSTGRES_PASSWORD: "${UNLEASH_PG_PASSWORD:?set in .env.prod}"
      POSTGRES_DB: unleash
    volumes:
      - unleash-pg-data:/var/lib/postgresql/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unleash -d unleash"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *obs-logging

  # Seed 3 default-off flags, then STAY ALIVE idling (nothing depends on it) so Komodo's stack-health
  # doesn't count an exited container as unhealthy (same pattern as langfuse-minio-init / agent-audit-init).
  unleash-seed:
    image: curlimages/curl:latest
    container_name: unleash-seed
    restart: unless-stopped
    depends_on:
      unleash-service:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        for f in mcm.agent.kill-switch mcm.agent.frontier-escalation mcm.agent.degrade; do
          curl -s -X POST http://unleash-service:4242/api/admin/projects/default/features \
            -H "Authorization: ${UNLEASH_ADMIN_TOKEN:?set in .env.prod}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"$$f\",\"type\":\"kill-switch\"}" || true
        done
        echo "unleash flags seeded (default-off)"
        exec sleep infinity
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - backend-network
    logging: *obs-logging

volumes:
  langfuse-pg-data:
    external: true
    name: observability-langfuse-postgres-data
  langfuse-clickhouse-data:
    external: true
    name: observability-langfuse-clickhouse-data
  langfuse-clickhouse-logs:
    external: true
    name: observability-langfuse-clickhouse-logs
  langfuse-minio-data:
    external: true
    name: observability-langfuse-minio-data
  otel-lgtm-data:
    external: true
    name: observability-otel-lgtm-data
  unleash-pg-data:
    external: true
    name: observability-unleash-postgres-data

networks:
  backend-network:
    external: true
