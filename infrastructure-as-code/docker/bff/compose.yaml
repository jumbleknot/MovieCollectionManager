name: localdev-bff

# Prerequisites:
#   1. Keycloak compose must be started first — it creates the backend-network.
#      cd infrastructure-as-code/docker/keycloak && docker compose up -d
#   2. Copy frontend/mcm-app/.env.docker.example → frontend/mcm-app/.env.docker and fill in secrets.
#   3. Build the BFF image: nx docker-build mcm-app  (or: docker build -t mcm-bff:latest frontend/mcm-app)

services:
  mcm-bff:
    image: mcm-bff:latest
    container_name: mcm-bff
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:3000"
    env_file:
      - ../../../frontend/mcm-app/.env.docker
    environment:
      NODE_ENV: production
      PORT: "3000"
      BFF_SOURCE: prod-container   # feature 007: E2E request-path marker (X-BFF-Source)
    logging:
      driver: json-file
      options:
        max-size: "10m"   # rotate at 10 MB; 10 files = 100 MB cap per service
        max-file: "10"    # ship to Loki/CloudWatch for time-based 30/90-day retention
    networks:
      - mcm-bff-network
      - backend-network
    depends_on:
      mcm-redis:
        condition: service_healthy
      mcm-bff-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/bff-api/auth/init || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Feature 007: Dev-config BFF container for the final local E2E run (US1).
  # Same image as mcm-bff, but NODE_ENV=development → auth.ts emits NON-Secure cookies
  # (the existing dev posture), so E2E works over plain HTTP on :8082. Keycloak is reached
  # via the Docker-internal URL in .env.docker (KEYCLOAK_URL=keycloak-service:8080) while
  # the browser/issuer uses KEYCLOAK_PUBLIC_URL=localhost:8099 (feature-006 split). Web E2E
  # targets :8082 directly; mobile points its /bff-api at :8082 while Metro serves JS on :8081.
  mcm-bff-dev:
    image: mcm-bff:latest
    container_name: mcm-bff-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:3000"
    env_file:
      - ../../../frontend/mcm-app/.env.docker
    environment:
      NODE_ENV: development
      PORT: "3000"
      BFF_SOURCE: dev-container
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - mcm-bff-network
      - backend-network
    depends_on:
      mcm-redis:
        condition: service_healthy
      mcm-bff-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/bff-api/auth/init || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Feature 007 (US3): TLS-terminating reverse proxy in front of the PROD mcm-bff.
  # Serves https://localhost:8443 with Caddy's internal CA and proxies to mcm-bff:3000.
  # Gives the prod container a real HTTPS edge so Secure cookies (NODE_ENV=production)
  # flow without weakening, and adds HSTS + enforces TLS 1.3. Profile: bff-prod.
  caddy:
    image: caddy:2.10-alpine
    container_name: mcm-bff-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8443:8443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data      # persists the internal CA across restarts (stable for emulator trust)
      - caddy-config:/config
    networks:
      - mcm-bff-network
    depends_on:
      mcm-bff:
        condition: service_healthy
    # TCP liveness: busybox wget in caddy:alpine can't validate the internal-CA cert,
    # so probe that Caddy is listening on :8443 (the upstream mcm-bff has its own healthcheck).
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8443 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mcm-redis:
    image: redis:8.6.2-alpine3.23
    container_name: mcm-bff-cache
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - mcm-bff-cache-redis-data:/data
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "5"
    networks:
      - mcm-bff-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 3

  # Feature 018: the BFF's OWN durable store for per-user encrypted agent config
  # (user_agent_config collection). Deliberately SEPARATE from mc-service's mc-db — the BFF must
  # not reach across a service boundary into a backend service's database (constitution §Decoupling).
  # It mirrors the BFF's already-separate Redis. STANDALONE mongod (no --replSet): the BFF store
  # does single-document upserts only — no multi-doc transactions — so it needs neither a replica
  # set nor `directConnection` (unlike mc-db, whose replica set exists for mc-service's cascade
  # delete). Host port 27018 to avoid clashing with mc-db's 27017.
  mcm-bff-db:
    image: mongodb/mongodb-community-server:8.0.8-ubi9
    container_name: mcm-bff-store
    restart: unless-stopped
    command: ["mongod", "--bind_ip_all"]
    ports:
      - "127.0.0.1:27018:27017"
    volumes:
      - mcm-bff-store-mongo-data:/data/db
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "5"
    networks:
      - mcm-bff-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  mcm-bff-network:
    name: mcm-bff-network
  backend-network:
    external: true

volumes:
  mcm-bff-cache-redis-data:
    external: true
    name: mcm-bff-cache-redis-data  # pre-created: docker volume create mcm-bff-cache-redis-data
  mcm-bff-store-mongo-data:        # feature 018: BFF-owned agent-config store (separate from mc-db)
    external: true
    name: mcm-bff-store-mongo-data # pre-created: docker volume create mcm-bff-store-mongo-data
  caddy-data:             # feature 007: Caddy internal-CA + cert store (compose-managed, transient)
  caddy-config:
