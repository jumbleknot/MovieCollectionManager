name: agent-gateway

# Agent Gateway (langgraph-api) hosting the supervisor graph + shared MCP client.
# Private network ONLY — the BFF is the sole caller (constitution §BFF is the security boundary).
#
# Port policy (see specs/012-multi-agent-mvp/quickstart.md "Token exchange across serving modes"):
#   - container-BFF dev / prod: NO published host port (internal DNS only).
#   - Metro dev ONLY: publish loopback-only 127.0.0.1:8123 via the agents-metro profile
#     below so the host-run BFF can reach it. NEVER 0.0.0.0, NEVER in prod.

services:
  agent-gateway:
    image: agent-gateway:latest
    container_name: agent-gateway
    restart: unless-stopped
    environment:
      - AGENT_DB_URL=postgresql://agent:agent@agent-db:5432/agent_db
      # Host Ollama is the only supported model-serving path (feature 019: containerized ollama removed).
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - MODEL_PROVIDER=ollama
      - SUPERVISOR_MODEL=${SUPERVISOR_MODEL:-qwen2.5}
      - SPECIALIST_MODEL=${SPECIALIST_MODEL:-qwen2.5:32b}
      - KEYCLOAK_URL=http://keycloak-service:8080
      - KEYCLOAK_REALM=grumpyrobot
      # Production agent nodes: `production_nodes_enabled` requires BOTH MCP URLs (else the graph
      # stays tool-free). movie-mcp is on backend-network; web-api-mcp is reachable only via the
      # isolated movie-assistant-mcp-network (it has NO backend access — egress-to-TMDB only).
      - MOVIE_MCP_URL=http://movie-mcp:8000/mcp
      - WEB_API_MCP_URL=http://web-api-mcp:8000/mcp
      # 014: spreadsheet-mcp (parse/build) — on backend-network (reaches the transient store).
      - SPREADSHEET_MCP_URL=http://spreadsheet-mcp:8000/mcp
      # RFC 8693 token re-exchange (aud=mc-service) for tool calls. The confidential client
      # secret is injected at deploy time (Keycloak admin lookup — see scripts/agent-stack.mjs);
      # never committed. Empty → token exchange skipped (tool calls fail-closed).
      - AGENT_GATEWAY_CLIENT_ID=${AGENT_GATEWAY_CLIENT_ID:-agent-gateway}
      - AGENT_GATEWAY_CLIENT_SECRET=${AGENT_GATEWAY_CLIENT_SECRET:-}
    depends_on:
      agent-db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend-network
      - movie-assistant-mcp-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

  # Metro-dev ONLY: same gateway with a loopback host port so the host-run BFF can reach it.
  # Activate with `--profile agents-metro`; never used in container/prod compose.
  agent-gateway-metro:
    extends:
      service: agent-gateway
    container_name: agent-gateway-metro
    ports:
      - "127.0.0.1:8123:8000"

networks:
  backend-network:
    external: true
  # Isolated gateway↔web-api-mcp link: lets the gateway reach web-api-mcp WITHOUT putting it on
  # backend-network (web-api-mcp must have no internal-service access — egress to TMDB only).
  # External so it is created once in first-time setup (`docker network create movie-assistant-mcp-network`).
  movie-assistant-mcp-network:
    external: true
