name: agent-db

# Isolated PostgreSQL for the LangGraph checkpointer (agent state only — NO domain data).
# Bounded-context isolation (constitution §Bounded-Context Isolation for Agent State).
# Private network only; no published host port.

services:
  movie-assistant-store-postgres:
    image: postgres:18.3-alpine3.23
    container_name: movie-assistant-store-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=agent
      - POSTGRES_PASSWORD=agent
      - POSTGRES_DB=agent_db
    volumes:
      - movie-assistant-store-postgres-data:/var/lib/postgresql/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  movie-assistant-store-postgres-data:
    external: true
    name: movie-assistant-store-postgres-data  # declared external so the stack include: preserves the name (no project prefix)

networks:
  backend-network:
    external: true
