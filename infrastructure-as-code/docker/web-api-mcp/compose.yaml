name: web-api-mcp

# web-api-mcp MCP server — outbound-only TMDB lookups.
# DELIBERATELY NOT attached to backend-network: no internal-service access (constitution
# §MCP Tool Layer "Scoped Capability"). Egress to TMDB only. No published host port.
# It IS on the isolated `movie-assistant-mcp-network` so the Agent Gateway (its sole caller) can reach it
# WITHOUT granting backend access — the gateway bridges movie-assistant-mcp-network↔backend, web-api-mcp does not.
# TMDB_API_KEY Vault-injected in prod; local dev reads it from the service .env.local.

services:
  movie-assistant-mcp-webapi:
    image: web-api-mcp:latest
    container_name: movie-assistant-mcp-webapi
    profiles: [agents]   # feature 039 Workstream B: profile lives here, not re-declared in the stack
    restart: unless-stopped
    env_file:
      - ../../../mcp-servers/web-api-mcp/.env.local
    networks:
      - movie-assistant-mcp-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

networks:
  movie-assistant-mcp-network:
    external: true
