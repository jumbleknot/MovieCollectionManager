# Production dormant Vault stack (prod-vault) — feature 025 (US3, research R6).
# Standalone Komodo ResourceSync stack (Komodo file_paths are run_directory-relative and this compose
# lives under docker/vault/), ordered `after=["prod-auth"]` and on backend-network so it stays logically
# in the auth tier. Upstream image only — no CI build/digest. Differences from dev vault/compose.yaml
# are flagged #PROD.
#
# Deployed UNINITIALIZED + SEALED (real Vault, NOT -dev): raft storage persists on vault-store-data; the
# healthcheck override reports healthy while dormant. Do NOT run `vault operator init` (out of scope).
# No secret in this file — a dormant Vault has no root token.
#
# First-time host setup (once):
#   docker volume create vault-store-data     # backend-network already exists (prod-auth)
name: prod-vault
services:
  vault-service:
    image: hashicorp/vault:1.18
    container_name: vault-service
    restart: always
    # #PROD BOTH are required together (do not remove IPC_LOCK):
    #  • cap_add: IPC_LOCK — the hashicorp/vault entrypoint setcaps the binary for it regardless of
    #    disable_mlock; WITHOUT the cap it takes a fallback path that double-starts vault → the second
    #    instance dies "bind: address already in use" (the entrypoint prints "please use --cap-add IPC_LOCK").
    #  • disable_mlock=true (vault.hcl) — so vault never calls mlockall, which would fail on the prod
    #    daemon's finite memlock rlimit ("cannot allocate memory") even with the cap. Also the raft best-practice.
    cap_add:
      - IPC_LOCK
    # #PROD `server` ONLY — do NOT pass `-config=...`. The hashicorp/vault entrypoint already appends
    # `-config=/vault/config` (the whole dir, where vault.hcl is bind-mounted). Passing the file
    # explicitly loads it TWICE → the listener stanza is defined twice → "bind: address already in use"
    # on :8200 (crash loop). NOT `server -dev` (ephemeral, fixed root token, data loss on restart) — the
    # entrypoint's -dev-* flags are inert without -dev, so this stays a real, sealed server.
    # (Verified locally against hashicorp/vault:1.18 with IPC_LOCK + a constrained memlock: comes up
    # uninitialized+sealed, 0 errors.)
    command: ["server"]
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
    # #PROD no published port — reachable by internal DNS on backend-network only.
    volumes:
      - ./config/vault.hcl:/vault/config/vault.hcl:ro
      # #PROD mount at /vault/file (a vault-owned image dir), NOT /vault/data (absent from the image →
      # root-owned → vault uid 100 can't write vault.db). Empty volume inherits vault:vault here. The
      # raft path in vault.hcl matches. Re-inherits correctly even on the already-created volume.
      - vault-store-data:/vault/file
    networks:
      - backend-network
    healthcheck:
      # #PROD override the uninit/sealed status codes so Komodo reads a dormant Vault as healthy. Once
      # an operator runs `vault operator init` + unseal (future), these codes resume their real meaning.
      test: ["CMD-SHELL", "wget -q -O /dev/null 'http://127.0.0.1:8200/v1/sys/health?uninitcode=200&sealedcode=200&standbycode=200' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  vault-store-data:
    external: true
    name: vault-store-data

networks:
  backend-network:
    external: true
