name: auth

# auth stack (feature 020) — IAM + secrets. Its own Compose project so it has an independent
# lifecycle from the other stacks (mcm / audit / observability). Shares the external
# backend-network + keycloak-network with them for cross-stack traffic.
#
#   pnpm nx up-auth infrastructure-as-code
#   # keycloak-service + keycloak-store-postgres + keycloak-mailpit start by default;
#   # vault-service only with --profile vault (prod posture).
#
# Bring this stack up BEFORE the mcm `app` profile — mc-service fetches Keycloak JWKS on
# startup (no cross-project depends_on; manual ordering, FR-006).

# Long-syntax includes with an explicit env_file pin the per-stack .env as the interpolation source
# for each included component file (feature 021 / research R1). Generate it first:
#   node scripts/gen-dev-secrets.mjs
include:
  - path: ../keycloak/compose.yaml
    env_file: ./auth.env
  - path: ../vault/compose.yaml
    env_file: ./auth.env
