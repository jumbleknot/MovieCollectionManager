name: observability

# observability stack (feature 020) — LangFuse + OTel (otel-lgtm) + OPA + Unleash. Its own
# Compose project. Vault was relocated OUT of here into the `auth` stack (FR-008). Every
# service is gated behind the `observability` profile (defined in observability/compose.yaml),
# so nothing starts on a bare `up`.
#
#   pnpm nx up-observability infrastructure-as-code
#   # → docker compose -p observability -f .../stacks/observability.compose.yaml --profile observability up -d

# env_file pins observability.env as the interpolation source for the observability component file
# (feature 021 / research R1). Generate it first: node scripts/gen-dev-secrets.mjs
include:
  - path: ../observability/compose.yaml
    env_file: ./observability.env
