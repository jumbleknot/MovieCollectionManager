name: mcm

# mcm stack (feature 020) — the application + its stores + the agent layer. Its own Compose
# project (independent lifecycle). Reaches the auth stack (Keycloak) over the shared external
# backend-network; bring `auth` up first (no cross-project depends_on — manual ordering, FR-006).
#
# Profiles (FR-007):
#   (no profile)      test infra: mc-service-store-mongo (+ rs-init), mcm-bff-cache-redis, mcm-bff-store-mongo
#   --profile app             + mc-service
#   --profile bff-nonsecure   + mcm-bff-service-nonsecure (dev cookie posture, HTTP :8082; standard E2E path)
#   --profile bff-secure      + mcm-bff-service-secure + mcm-bff-tls-proxy (prod cookie posture, HTTPS :8443)
#   --profile agents          + movie-assistant-gateway + the 3 MCP servers + movie-assistant-store-postgres
#   --profile agents-metro    movie-assistant-gateway-metro on loopback 127.0.0.1:8123 (Metro-dev BFF only)
#
#   pnpm nx up-mcm infrastructure-as-code
#   docker compose -p mcm -f infrastructure-as-code/docker/stacks/mcm.compose.yaml --profile app --profile bff-nonsecure up -d

# Feature 039 (Workstream B): the per-service `profiles:` assignments now live IN each included compose
# file (mc-service→[app], bff→[bff-nonsecure]/[bff-secure], the agent services→[agents]/[agents-metro]),
# NOT re-declared here. That removes the include-override merge (`services.<x> conflicts with imported
# resource`) that only newer Docker Compose accepted, so this stack now parses on any conformant Compose
# (v2.40.x apt plugin ↔ v5.x). The default test-infra services (mc-service-store-mongo + rs-init,
# mcm-bff-cache-redis, mcm-bff-store-mongo) carry no profile → start by default.
#
# The agent-db / agent-gateway component files reference ${AGENT_DB_PASSWORD}; pin mcm.env as their
# interpolation source via env_file (feature 021 / research R1). Generate it first:
#   node scripts/gen-dev-secrets.mjs
include:
  - ../mc-service/compose.yaml
  - ../bff/compose.yaml
  - path: ../agent-db/compose.yaml
    env_file: ./mcm.env
  - path: ../agent-gateway/compose.yaml
    env_file: ./mcm.env
  - ../movie-mcp/compose.yaml
  - ../web-api-mcp/compose.yaml
  - ../spreadsheet-mcp/compose.yaml
