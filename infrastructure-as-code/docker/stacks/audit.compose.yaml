name: audit

# audit stack (feature 020) — append-only agent-audit sink (OpenSearch). Its own Compose
# project. The agent-audit-opensearch service is gated behind its own `audit` profile
# (defined in opensearch/compose.yaml), so nothing starts on a bare `up` without it.
#
#   pnpm nx up-audit infrastructure-as-code
#   # → docker compose -p audit -f .../stacks/audit.compose.yaml --profile audit up -d

# env_file pins audit.env as the interpolation source for the opensearch component file
# (feature 021 / research R1). Generate it first: node scripts/gen-dev-secrets.mjs
include:
  - path: ../opensearch/compose.yaml
    env_file: ./audit.env
