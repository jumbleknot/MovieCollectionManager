# Komodo Stacks as config-as-code (feature 023, work order Phase 15 §6 / plan.md Addendum R9).
#
# A Komodo ResourceSync (resource_path = infrastructure-as-code/komodo) diff-applies these [[stack]]
# blocks; deploy=true + after= makes the sync ALSO deploy them, in dependency order. After the one-time
# bootstrap (git provider + the `mcm-repo` Repo + masked Variables + the ResourceSync — task T036),
# every deploy is `git push` → signed webhook → reconcile.
#
# ── No committed host / domain / IP / secret (the 023 scrub rule) ───────────────────────────────────
#   • Git HOST is NOT inline — it lives in the `mcm-repo` Repo resource (created at bootstrap);
#     each stack references it via `linked_repo = "mcm-repo"` + a branch. A name, not a host string.
#   • Domain / Tailscale admin IP / registry host → Komodo Variables, interpolated as [[NAME]] at
#     deploy time (seed them masked in Komodo, T036). The committed TOML carries only the token.
#   • Per-stack secrets → [[name]] Variables too.
#   • Image digests are NOT here — host-free `.env.deploy` (R10) carries bare *_DIGEST; the compose
#     assembles ${REGISTRY_HOST}/jumbleknot/<svc>@${<SVC>_DIGEST}. (`jumbleknot` is the public OCI
#     namespace = the kept GitHub org, intentionally retained — NOT a scrubbed literal.)
# The guardrails gate scans this file (T032) so a real host/domain/IP can't slip past the [[var]] form.
#
# All four prod stacks are LIVE (created manually during Phase 15). Deploy order via `after`:
# prod-auth → prod-mc-service → prod-mcm-bff → prod-movie-assistant (agents last — spreadsheet-mcp
# needs prod-mcm-bff's mcm-bff-network/Redis).
# `branch = "main"` — 022→023 merged (T037, 2026-07-03). The `prod-app → prod-mcm-bff` rename cutover was
# also done manually, so all 4 live stacks already carry these canonical names → the ResourceSync ADOPTS
# them in place (a config diff, not a create-from-scratch). Preview the diff before the first apply.

[[stack]]
name = "prod-auth"
deploy = true
after = []                                    # root of the deploy order (Keycloak first; others wait on it)
[stack.config]
server = "Local"
linked_repo = "mcm-repo"                       # holds git host/account/repo (bootstrap, not synced)
branch = "main"
run_directory = "infrastructure-as-code/docker/keycloak"
file_paths = ["compose.prod.yaml"]
env_file_path = ".env.prod"                    # Komodo writes the interpolated `environment` here (secrets)
environment = """
BASE_DOMAIN=[[BASE_DOMAIN]]
KC_ADMIN_BIND_IP=[[TS_ADMIN_IP]]
KC_HOSTNAME_ADMIN=http://[[TAILNET_HOST]]:8099
KC_BOOTSTRAP_ADMIN_PASSWORD=[[KC_BOOTSTRAP_ADMIN_PASSWORD]]
KC_DB_PASSWORD=[[KC_DB_PASSWORD]]
PROD_REALM_FILE=/home/prod/keycloak/prod-realm.rendered.json
"""

[[stack]]
name = "prod-mc-service"                         # data stack — mc-service + its replica-set Mongo (internal only)
deploy = true
after = ["prod-auth"]                            # waits on Keycloak (mc-service fetches JWKS on startup)
[stack.config]
server = "Local"
linked_repo = "mcm-repo"
branch = "main"
run_directory = "infrastructure-as-code/docker/mc-service"
file_paths = ["compose.prod.yaml"]
env_file_path = ".env.prod"                      # Komodo writes the env below here (just REGISTRY_HOST — no secrets)
additional_env_files = [".env.deploy"]           # committed host-free MC_SERVICE_DIGEST
environment = """
REGISTRY_HOST=[[REGISTRY_HOST]]
"""

[[stack]]
name = "prod-mcm-bff"                           # renames the live `prod-app` (user 2026-06-29b)
deploy = true
after = ["prod-mc-service"]                      # BFF needs mc-service (data); prod-mc-service itself waits on prod-auth
[stack.config]
server = "Local"
linked_repo = "mcm-repo"
branch = "main"
run_directory = "infrastructure-as-code/docker/bff"
file_paths = ["compose.prod.yaml"]
env_file_path = ".env.prod"                     # secrets + REGISTRY_HOST (Komodo writes the env below here)
additional_env_files = [".env.deploy"]          # committed host-free bare digests; passed LAST so ${MCM_BFF_DIGEST} wins from git
environment = """
BASE_DOMAIN=[[BASE_DOMAIN]]
REGISTRY_HOST=[[REGISTRY_HOST]]
KEYCLOAK_CLIENT_SECRET=[[mcm_keycloak_client_secret]]
KEYCLOAK_SERVICE_CLIENT_SECRET=[[mcm_keycloak_service_client_secret]]
COOKIE_SECRET=[[mcm_cookie_secret]]
AGENT_CONFIG_ENC_KEY=[[mcm_agent_config_enc_key]]
AGENT_SUBJECT_TOKEN_CLIENT_SECRET=[[AGENT_SUBJECT_TOKEN_CLIENT_SECRET]]
"""

[[stack]]
name = "prod-movie-assistant"                   # agent stack — gateway + checkpointer DB + 3 scoped MCP servers
deploy = true
after = ["prod-mcm-bff"]                         # last: spreadsheet-mcp needs prod-mcm-bff's mcm-bff-network/Redis
[stack.config]
server = "Local"
linked_repo = "mcm-repo"
branch = "main"
run_directory = "infrastructure-as-code/docker/agents"
file_paths = ["compose.prod.yaml"]
env_file_path = ".env.prod"
additional_env_files = [".env.deploy"]           # committed host-free agent/mcp digests
environment = """
REGISTRY_HOST=[[REGISTRY_HOST]]
AGENT_DB_PASSWORD=[[AGENT_DB_PASSWORD]]
AGENT_GATEWAY_CLIENT_SECRET=[[AGENT_GATEWAY_CLIENT_SECRET]]
"""
