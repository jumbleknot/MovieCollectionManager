openapi: 3.0.3
info:
  title: MCM Agent Gateway BFF API
  version: 0.1.0
  description: >
    BFF routes that proxy the client to the Agent Gateway (feature 012). These routes are a
    SECURE PROXY + AG-UI passthrough — they do NOT transform AG-UI event shapes. Contract
    source of truth: specs/012-multi-agent-mvp/contracts/agent-bff-routes.md.
    Auth pattern (per existing BFF routes): requireAuth -> requireMcUser before any upstream call.
    Scaffold/stub — schemas filled in during T028 (run), T044 (resume), T057 (ui-state).
servers:
  - url: /bff-api/agent
paths:
  /run:
    post:
      summary: Start or continue a conversation turn (streams AG-UI events back)
      description: >
        Implements T028. requireAuth + requireMcUser; enforce per-user rate limit + cost
        ceiling; sanitize uiState against the structural allowlist; mint a run-scoped RFC 8693
        subject token; proxy the gateway's native AG-UI stream (SSE/WebSocket) unchanged.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message: { type: string }
                threadId: { type: string, nullable: true }
                uiState: { $ref: '#/components/schemas/UiStateSnapshot' }
              required: [message]
      responses:
        '200': { description: AG-UI event stream (text/event-stream or WebSocket upgrade) }
        '401': { description: Unauthenticated }
        '403': { description: Authenticated but lacks mc-user/mc-admin }
        '429': { description: Rate limit or cost ceiling exceeded — friendly retry }
        '503': { description: Gateway/provider unavailable — "couldn't complete" }
  /resume:
    post:
      summary: Resume an interrupted run after a HITL decision (approval authorization point)
      description: >
        Implements T044. In-session auth sufficient (no step-up). Mints a fresh subject token;
        resumes the checkpoint; on approve re-validates + applies writes (idempotency keys);
        records an ApprovalDecision to the audit stream.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                threadId: { type: string }
                proposalId: { type: string }
                decision: { type: string, enum: [approved, rejected] }
              required: [threadId, proposalId, decision]
      responses:
        '200': { description: Continuation AG-UI stream (confirmation + per-item applied/skipped) }
        '401': { description: Session lapsed — re-authenticate }
        '404': { description: Thread/proposal unknown, resolved, or expired }
  /ui-state:
    post:
      summary: Push a sanitized readable UI-state snapshot (context-aware "this" resolution)
      description: Implements T057. requireAuth; sanitize via the allowlist; update the active thread's ui_snapshot.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UiStateSnapshot' }
      responses:
        '204': { description: Snapshot accepted }
        '401': { description: Unauthenticated }
components:
  schemas:
    UiStateSnapshot:
      type: object
      description: Structural allowlist only — no user-entered values or PII (data-model.md).
      properties:
        currentScreen: { type: string }
        collectionId: { type: string, nullable: true }
        movieId: { type: string, nullable: true }
        activeFilterKeys: { type: array, items: { type: string } }
        navDepth: { type: integer }
