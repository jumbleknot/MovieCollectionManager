appId: com.grumpyrobot.mcmapp
---
# T031 (mobile, 013 US3): tapping an assistant movie card opens that movie's detail screen.
# Mirror of tests/e2e/web/agent-card-navigate.spec.ts. Ask about an in-collection movie → the query
# find path emits a render_movie_card carrying movieId + collectionId → the card is pressable →
# tapping it router.push-es to that movie's detail screen.
#
# Uses the fixture movie "Epsilon" in "E2E Browse". Drives the full live stack: CopilotKit dock →
# BFF /run → gateway → Ollama classify/extract → query node → movie-mcp list_movies →
# render_movie_card → card tap → router.push.
#
# IMPORTANT (R15): the dock is driven IN-APP from home — never deep-load the collection first.
#
# Requires: full agent stack; the app uses Metro's BFF (:8081 → AGENT_GATEWAY_URL 127.0.0.1:8123).
# Publish the containerized gateway on :8123 with a socat proxy (see agent-navigate-movie.yaml).
# adb reverse tcp:8081 + tcp:8099. Logged-out start. Env: E2E_TEST_USER, E2E_TEST_PASSWORD.

# Independent state (CLAUDE.md): clear + stop so each flow starts logged-OUT and _login-helper
# (which requires the login screen) works in the back-to-back CI suite. The per-user agent config
# lives server-side, so it survives clearState — the dock is still runnable after re-login.
- launchApp:
    stopApp: true
    clearState: true
- runFlow: "_login-helper.yaml"
- extendedWaitUntil:
    visible:
      id: "home-screen-create-button"
    timeout: 20000

- tapOn:
    id: "assistant-dock-toggle"
- extendedWaitUntil:
    visible:
      id: "assistant-dock-panel"
    timeout: 10000

# Ask about the in-collection movie → the find path renders a pressable card.
- tapOn:
    id: "assistant-dock-input"
- inputText: "do I have Epsilon in my E2E Browse collection"
- pressKey: Back
- tapOn:
    id: "assistant-dock-send"

# "do I have <title> in my <collection>" routes to the SEARCH node (013 US7 owns all find/"do I
# have"). A single owned match is offered as a result BUTTON (New Scope 1 — never auto-navigated,
# never a bare render_movie_card); tapping it deep-links to the movie's detail screen. Mirror of the
# web spec tests/e2e/web/agent-card-navigate.spec.ts (the old render-movie-card expectation here was
# stale — that behavior predates the 013 US7 search-owns-find change).
- extendedWaitUntil:
    visible:
      id: "selection-options"
    timeout: 150000
# The pick sits above the trailing control buttons and the dock auto-scrolls to the bottom, so the
# pick can be off the top of the viewport — scroll it into view (direction UP) before tapping (same
# off-screen-after-autoscroll pattern as agent-search / the assistant-config banner).
- scrollUntilVisible:
    element:
      id: "selection-option-pick-0"
    direction: UP
    timeout: 20000
- tapOn:
    id: "selection-option-pick-0"
- extendedWaitUntil:
    visible:
      id: "movie-detail-title"
    timeout: 60000
- assertVisible:
    text: ".*Epsilon.*"
