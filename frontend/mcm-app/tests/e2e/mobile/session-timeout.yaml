appId: com.jumbleknot.mcmapp
---
# T-150: Idle session timeout redirects the user to the login screen.
# Requires: Keycloak + BFF running, seeded test user.
# Requires: App built with EXPO_PUBLIC_DEV_IDLE_TIMEOUT_OVERRIDE_MS=5000
#   so the idle timer fires after ~5 seconds rather than 30 minutes.
# Run: maestro test session-timeout.yaml --env E2E_TEST_USER=testuser --env E2E_TEST_PASSWORD=TestPass1!ok
- launchApp:
    clearState: true
- runFlow: "_login-helper.yaml"
- assertVisible:
    id: "home-route"

# Wait for the short-circuit idle timeout to fire and redirect to login.
# extendedWaitUntil polls until the condition is met or the timeout elapses.
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 30000
- assertVisible:
    id: "btn-login-with-keycloak"
# Verify the specific inactivity message required by the spec (FR-015)
- assertVisible: "Your session has expired due to inactivity. Please log in again."
