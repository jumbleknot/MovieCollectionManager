appId: com.grumpyrobot.mcmapp
---
# T070 (mobile, 013 US7 + US10): the unified movie-search workflow. Mirror of
# tests/e2e/web/agent-search.spec.ts.
#   "find Inception in my E2E Browse collection" → owned search misses → render_selection control
#   buttons → tap "Search the web" → TMDB results → a read-only preview card carrying a clickable
#   themoviedb.org link (US10) + an "Add to collection" affordance. Read-only (no write/approval).
#
# Drives the full live stack: CopilotKit dock → BFF /run → gateway → Ollama classify → search node
# (pure-code resolution) → web-api-mcp search_title → render_movie_card.
#
# Requires: full agent stack; the app uses Metro's BFF (:8081 → AGENT_GATEWAY_URL 127.0.0.1:8123).
# Publish the containerized gateway on :8123 with a socat proxy (see agent-navigate-movie.yaml).
# adb reverse tcp:8081 + tcp:8099. Logged-out start. Env: E2E_TEST_USER, E2E_TEST_PASSWORD.
# NOTE: a live emulator run is gated by the _login-helper SSO-timing flake (see assistant-disambiguate.yaml).

# Independent state (CLAUDE.md): clear + stop so each flow starts logged-OUT and _login-helper
# (which requires the login screen) works in the back-to-back CI suite. The per-user agent config
# lives server-side, so it survives clearState — the dock is still runnable after re-login.
- launchApp:
    stopApp: true
    clearState: true
- runFlow: "_login-helper.yaml"
- extendedWaitUntil:
    visible:
      id: "home-screen-create-button"
    timeout: 20000

- tapOn:
    id: "assistant-dock-toggle"
- extendedWaitUntil:
    visible:
      id: "assistant-dock-panel"
    timeout: 10000

# Turn 1: a title NOT in the collection → owned miss → workflow control buttons.
- tapOn:
    id: "assistant-dock-input"
- inputText: "find Inception in my E2E Browse collection"
- pressKey: Back
- tapOn:
    id: "assistant-dock-send"
- extendedWaitUntil:
    visible:
      id: "selection-options"
    timeout: 150000
- assertNotVisible:
    id: "approval-request"

# Tap the "Search the web" control (exact button text, not the assistant message bubble).
- tapOn:
    text: "Search the web"

# The TMDB web search is ASYNC and renders a multi-result render_selection (pick buttons ABOVE the
# control buttons). The dock auto-scrolls to the conversation END (the trailing controls), leaving
# selection-option-pick-0 (the FIRST pick) off the TOP of the viewport — and extendedWaitUntil does
# NOT scroll. scrollUntilVisible both waits for the async result AND scrolls UP to the pick. (Same
# off-screen-after-autoscroll interaction as the assistant-config banner fix.)
- scrollUntilVisible:
    element:
      id: "selection-option-pick-0"
    direction: UP
    timeout: 150000
- tapOn:
    id: "selection-option-pick-0"

# The web preview card renders with the US10 TMDB link + add affordance. Still read-only.
- extendedWaitUntil:
    visible:
      id: "render-movie-card"
    timeout: 150000
- assertVisible:
    id: "render-movie-card-url"
- assertVisible:
    id: "render-movie-card-add"
- assertNotVisible:
    id: "approval-request"
