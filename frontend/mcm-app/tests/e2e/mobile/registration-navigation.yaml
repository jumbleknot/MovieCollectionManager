appId: com.jumbleknot.mcmapp
---
# T-010: "Create Account" link navigates to the registration screen.
- launchApp:
    stopApp: false
    clearState: false
# Wait for the login screen to fully render — timing varies across test runs
# depending on Metro bundle cache state and emulator load.
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 30000
- tapOn:
    id: "link-create-account"
- extendedWaitUntil:
    visible:
      id: "input-firstName"
    timeout: 10000
- assertVisible:
    id: "input-email"
- assertVisible:
    id: "input-username"
- assertVisible:
    id: "input-password"
- assertVisible:
    id: "input-confirmPassword"
- assertVisible:
    id: "btn-create-account"
