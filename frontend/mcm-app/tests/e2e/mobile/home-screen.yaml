appId: com.grumpyrobot.mcmapp
---
# T-099: Authenticated home → profile shows navigation bar, profile display, and correct user details.
# Requires: Keycloak + BFF running, seeded test user.
# Run: scripts/maestro-run.sh tests/e2e/mobile/home-screen.yaml
- launchApp:
    stopApp: false
    clearState: false
- runFlow: "_login-helper.yaml"

# Allow navigation bar animations to settle after login redirect
- waitForAnimationToEnd:
    timeout: 3000

# Home screen loaded — navigate to profile tab
- assertVisible:
    id: "home-route"
- assertVisible:
    id: "navigation-bar"
- tapOn:
    id: "nav-profile"

# Profile screen shows all required elements
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 10000
- assertVisible:
    id: "profile-display"
- assertVisible:
    id: "btn-logout"

# All six required profile fields are rendered (US3 Scenario 2 / FR-009)
- assertVisible:
    id: "profile-username"
- assertVisible:
    id: "profile-email"
- assertVisible:
    id: "profile-first-name"
- assertVisible:
    id: "profile-last-name"
- assertVisible:
    id: "profile-roles"
- assertVisible:
    id: "profile-status"

# Username text matches the seeded test account
- assertVisible: ${MAESTRO_E2E_TEST_USER}

# NEGATIVE gating (feature 040 follow-on): the admin-settings card is admin-only, so the mc-user
# test account must NOT see it. (The positive path is admin-card.yaml; the web + unit suites cover
# this gating in CI.)
- assertNotVisible:
    id: "profile-admin-settings-card"
