# Requires: Keycloak + BFF running, seeded test user.
# Run: scripts/maestro-run.sh tests/e2e/mobile/login-keycloak.yaml
- launchApp:
    stopApp: false
    clearState: false
- runFlow: "_login-helper.yaml"
- assertVisible:
    id: "home-route"
