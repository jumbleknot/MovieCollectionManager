appId: com.grumpyrobot.mcmapp
---
# T071g (mobile): Query your collection by conversation — the US4 read capability on Android.
# Mobile leg of tests/e2e/web/assistant-query.spec.ts (SC-001 parity for the READ path).
#
# Maestro can't seed movies via the BFF API the way the web spec does, so the mobile leg drives
# the deterministic, TMDB-free shape against an EMPTY UI-created collection:
#   count — "how many movies are in my <name> collection" → "0 movie(s) …" (server-side count).
# The list-N case is covered fully on the web leg (which seeds via the BFF). Both legs exercise the
# same path: intent classify → query node → movie-mcp count/list_movies → mc-service.
#
# Locating ONE specific film ("do I have X", "find X") is the search node's job (013 US7) — a hit
# is offered as a SELECTION button (not a card), a miss offers a web fallback (not "isn't in your
# collection"). That find path is covered by tests/e2e/mobile/agent-search.yaml, not here.
#
# IMPORTANT (research R15): the dock is driven IN-APP from home (Maestro taps through the UI),
# never a deep-load — a fresh deep-load of a collection resets the CopilotKit dock agent.
#
# Requires: full agent stack (HANDOFF.md) + Ollama + a mc-service image carrying /movies/count
# (T071b) + adb reverse tcp:8081 + tcp:8099. Env vars:
#   E2E_TEST_USER, E2E_TEST_PASSWORD, COLLECTION_NAME (unique per run, e.g. t071-q-<ts>).
# Run: maestro test tests/e2e/mobile/assistant-query.yaml \
#        --env E2E_TEST_USER=testuser --env E2E_TEST_PASSWORD='TestPass1!ok' \
#        --env COLLECTION_NAME="t071-q-$(date +%s)"

- launchApp:
    stopApp: true
    clearState: true
- runFlow: "_login-helper.yaml"
- extendedWaitUntil:
    visible:
      id: "home-screen-create-button"
    timeout: 20000

# ── Seed: create an EMPTY collection via the UI form (deterministic, no TMDB). ──
- tapOn:
    id: "home-screen-create-button"
- extendedWaitUntil:
    visible:
      id: "home-screen-create-modal"
    timeout: 5000
- tapOn:
    id: "collection-form-name-input"
- inputText: "${COLLECTION_NAME}"
- tapOn:
    id: "collection-form-submit-button"
- extendedWaitUntil:
    notVisible:
      id: "home-screen-create-modal"
    timeout: 10000

# ── count: "how many movies are in my <name> collection" → "0 movie(s) …". ──
- tapOn:
    id: "assistant-dock-toggle"
- extendedWaitUntil:
    visible:
      id: "assistant-dock-panel"
    timeout: 10000
- tapOn:
    id: "assistant-dock-input"
- inputText: "how many movies are in my ${COLLECTION_NAME} collection"
- pressKey: Back
- tapOn:
    id: "assistant-dock-send"
- extendedWaitUntil:
    visible:
      text: "0 movie"
    timeout: 150000

# ── Teardown: close the dock → delete the collection. ──
- tapOn:
    id: "assistant-dock-toggle"
- extendedWaitUntil:
    visible:
      id: "home-screen-create-button"
    timeout: 20000
- scrollUntilVisible:
    element:
      text: "${COLLECTION_NAME}"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "collection-card-action-delete"
    below:
      text: "${COLLECTION_NAME}"
- extendedWaitUntil:
    visible:
      id: "delete-dialog"
    timeout: 5000
- tapOn:
    id: "delete-dialog-confirm-button"
