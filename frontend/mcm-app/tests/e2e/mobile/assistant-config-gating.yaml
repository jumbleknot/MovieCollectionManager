appId: com.grumpyrobot.mcmapp
---
# T045 (mobile, US1): the assistant is OFF until opted in — no dock when not runnable.
# Mobile leg of tests/e2e/web/assistant-config.spec.ts "off by default" (SC-001 parity).
#
# Maestro can't clear the per-user config via the BFF API the way the web spec does, so this
# flow reaches the not-runnable state through the UI (disable + save) and then asserts the dock
# is absent — the same gate (FR-002 / T018: dock mounts only for a runnable config). The new-user
# case is also covered on the web leg (which DELETEs via the API).
#
# IMPORTANT (research R15): drive the dock IN-APP from home, never a deep-load.
# Requires: full agent stack (HANDOFF.md) + adb reverse tcp:8081 + tcp:8099.
# Env: E2E_TEST_USER, E2E_TEST_PASSWORD.
# Run: scripts/maestro-run.sh tests/e2e/mobile/assistant-config-gating.yaml

- launchApp:
    stopApp: true
    clearState: true
- runFlow: "_login-helper.yaml"
- extendedWaitUntil:
    visible:
      id: "home-screen-create-button"
    timeout: 20000

# ── Reach the not-runnable state: Profile → assistant config → disable → save. ──
- tapOn:
    id: "nav-profile"
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 10000
# The config is seeded-runnable, so the assistant dock overlay is mounted on this screen. If it is
# OPEN (its state persists across navigation) its chat panel covers the config form's Save button —
# close it first. Guarded on the open-state label so it is a no-op when the dock is closed/absent.
- runFlow:
    when:
      visible:
        text: "Close assistant"
    commands:
      - tapOn:
          id: "assistant-dock-toggle"
# Scroll to the TOGGLE itself (not the "assistant-config" container — its testID is also on the
# loading state and on the section heading, so scrolling to it stops ABOVE the toggle, which is
# below the fold, and the no-wait tap then misses). The profile screen now has paddingBottom so the
# Save button scrolls fully clear of the bottom-left dock toggle. enable-anthropic/disable scroll to
# the toggle too.
- scrollUntilVisible:
    element:
      id: "assistant-config-enabled-toggle"
    direction: DOWN
    centerElement: true
    timeout: 10000
# CI seeds the test user with a runnable config (T050), so the assistant starts enabled here —
# toggling off + saving reaches the not-runnable state deterministically.
- tapOn:
    id: "assistant-config-enabled-toggle"
- scrollUntilVisible:
    element:
      id: "assistant-config-save"
    direction: DOWN
    centerElement: true
    timeout: 5000
- tapOn:
    id: "assistant-config-save"
# centerElement scrolled the form DOWN to the Save button, so the success banner (rendered at the TOP
# of the form, above the toggle) is off-screen above. extendedWaitUntil does NOT scroll, so scroll UP
# to bring the banner into view — this also waits for the async save to complete.
- scrollUntilVisible:
    element:
      id: "assistant-config-banner"
    direction: UP
    timeout: 20000

# ── Assert: back on home, the dock toggle is NOT mounted (gated on a runnable config). ──
- tapOn:
    id: "nav-home"
- extendedWaitUntil:
    visible:
      id: "home-screen-create-button"
    timeout: 20000
- assertNotVisible:
    id: "assistant-dock-toggle"
