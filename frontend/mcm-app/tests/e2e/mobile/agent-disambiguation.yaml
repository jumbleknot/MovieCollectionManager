appId: com.grumpyrobot.mcmapp
---
# T037 (mobile, 013 US4): ambiguous look-up candidates render as selectable BUTTONS; tapping one
# proceeds with that match. Mirror of tests/e2e/web/agent-disambiguation.spec.ts.
# "look up Avatar" → the curator offers ambiguous matches + emits render_disambiguation → the client
# renders one button per candidate → tapping the non-first button (by POSITION, not by name —
# the list is live TMDB data and drifts) posts the canonical "<title> (<year>)" pick → the curator
# resolves it → that film's card.
#
# Enrich-only (no write/approval). Drives the full live stack: CopilotKit dock → BFF /run → gateway
# → Ollama classify/extract → curator enrich (ambiguous) → render_disambiguation → button tap →
# curator resolve_option → render_movie_card.
#
# Requires: full agent stack; the app uses Metro's BFF (:8081 → AGENT_GATEWAY_URL 127.0.0.1:8123).
# Publish the containerized gateway on :8123 with a socat proxy (see agent-navigate-movie.yaml).
# adb reverse tcp:8081 + tcp:8099. Logged-out start. Env: E2E_TEST_USER, E2E_TEST_PASSWORD.
# NOTE: a live emulator run is gated by the _login-helper SSO-timing flake (see assistant-disambiguate.yaml).

# Independent state (CLAUDE.md): clear + stop so each flow starts logged-OUT and _login-helper
# (which requires the login screen) works in the back-to-back CI suite. The per-user agent config
# lives server-side, so it survives clearState — the dock is still runnable after re-login.
- launchApp:
    stopApp: true
    clearState: true
- runFlow: "_login-helper.yaml"
- extendedWaitUntil:
    visible:
      id: "home-screen-create-button"
    timeout: 20000

- tapOn:
    id: "assistant-dock-toggle"
- extendedWaitUntil:
    visible:
      id: "assistant-dock-panel"
    timeout: 10000

# Turn 1: ambiguous title → the curator offers selectable option buttons.
- tapOn:
    id: "assistant-dock-input"
- inputText: "tell me about Avatar"
- pressKey: Back
- tapOn:
    id: "assistant-dock-send"
- extendedWaitUntil:
    visible:
      id: "disambiguation-options"
    timeout: 150000
# The container alone is NOT proof — it renders even with zero buttons, so asserting only on it let
# a broken pick masquerade as an "empty dock panel" (#539). Assert a real button exists, mirroring
# the web spec's `disambig-option-0` check.
- assertVisible:
    id: "disambig-option-0"
- assertNotVisible:
    id: "approval-request"

# Tap the NON-FIRST candidate BY POSITION (testID), never by name.
#
# This block previously matched the button by its label text, which stacked four problems — three
# fixed in #539, the fourth fatal on 2026-07-20:
#
# 1. `text:` is a REGEX (`textRegex` in the Maestro log), so "Avatar: The Way of Water (2022)"
#    treated "(2022)" as a capture GROUP and could never match the real label.
# 2. Maestro's text selector has NO scoping, so a bare title regex also matched the assistant
#    BUBBLE, which lists every candidate in one sentence. Hence the "Choose …" accessibilityLabel.
# 3. The list is live TMDB data ranked by popularity and it DRIFTS, so the target sank below the
#    fold — hence scrollUntilVisible and the optional "show more" tap.
# 4. On 2026-07-20 the target left the offered set ENTIRELY ("Avatar: Fire and Ash" and
#    "Avatar Aang: The Last Airbender" now outrank it). `disambig-more` was absent — proving the
#    list was NOT truncated — so no amount of scrolling could have found it. 3/3 attempts failed.
#
# Selecting by testID removes all four at once: no regex, no scoping ambiguity, no drift dependency,
# and slot 1 is always on screen so no scrolling is needed. What US4-AC2 actually asserts is that
# tapping a NON-FIRST candidate resolves to THAT candidate — which does not depend on which films
# TMDB returns today.
#
# The web mirror additionally reads the label and asserts the card matches it. Maestro cannot do that
# safely: interpolating a captured label back into a `text:` selector would reintroduce trap 1, since
# the label contains "(YYYY)". So mobile asserts structurally — a card rendered and the options
# collapsed — and the semantic check lives in agent-disambiguation.spec.ts.
- assertVisible:
    id: "disambig-option-1"
- tapOn:
    id: "disambig-option-1"

# The curator resolves the tapped pick and renders that film's card.
- extendedWaitUntil:
    visible:
      id: "render-movie-card"
    timeout: 150000
# A card with a real title — not an empty shell. Which film it is depends on live TMDB ranking, so
# it is deliberately not asserted here (see the note above); the web mirror covers that.
- assertVisible:
    id: "render-movie-card-title"
# The options collapse once resolved — proof the tap drove the resolution rather than the card
# happening to appear.
- assertNotVisible:
    id: "disambiguation-options"
- assertNotVisible:
    id: "approval-request"
