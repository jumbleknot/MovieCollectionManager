appId: com.jumbleknot.mcmapp
tags:
  - helper
---
# Reusable login helper — included via runFlow in other flows.
# Requires env vars: E2E_TEST_USER, E2E_TEST_PASSWORD
# Example: maestro test login-keycloak.yaml --env E2E_TEST_USER=testuser --env E2E_TEST_PASSWORD=TestPass1!ok
#
# Assumes the app is on the login screen when this flow starts.
#
# Ends with home-screen-create-button visible. If FR-009 auto-redirected to
# the default collection screen, this helper navigates back to home so that
# all callers can rely on a consistent starting state.
#
# Why home-screen-create-button (not home-route) is the stable signal:
#   home-route (the SafeAreaView) renders immediately on HomeScreen mount,
#   even during isLoading=true — so it appears BEFORE FR-009 has had a chance
#   to redirect. home-screen-create-button is only rendered when:
#     1. Auth code exchange and session creation are complete
#     2. Collections have finished loading (isLoading = false)
#     3. FR-009 check has run and confirmed no redirect (isFr009Checked = true)
#   Making it the only reliable "home is fully settled" signal.
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 30000
- tapOn:
    id: "btn-login-with-keycloak"
# Wait for Chrome Custom Tab to open (2-4s on emulator) or for the SSO redirect
# to complete (which returns the app to the foreground before animations settle).
- waitForAnimationToEnd:
    timeout: 6000
# If SSO is active, Keycloak redirects immediately and animations settle with
# home-route visible — condition is false, skip form fill. If no SSO, Chrome
# Custom Tab stays open and home-route is not visible — poll until the form is
# accessible, then fill it. Using notVisible+extendedWaitUntil avoids the race
# where runFlow when visible fires before Chrome's accessibility tree is built.
- runFlow:
    when:
      notVisible:
        id: "home-route"
    commands:
      # SSO redirect: Chrome closed quickly but app is still processing the auth code.
      # Neither home-route nor the Keycloak form is visible — wait for home-route.
      - runFlow:
          when:
            notVisible:
              text: "Username or email"
          commands:
            - extendedWaitUntil:
                visible:
                  id: "home-route"
                timeout: 30000
      # No SSO: Keycloak form is visible — fill credentials.
      - runFlow:
          when:
            visible:
              text: "Username or email"
          commands:
            - tapOn:
                text: "Username or email"
            - inputText: ${E2E_TEST_USER}
            - tapOn:
                point: "50%,47%"
            - inputText: ${E2E_TEST_PASSWORD}
            - pressKey: Enter

# After form submit: Chrome is processing the auth code and home-route may
# not be visible yet. Wait for it before checking animations.
- runFlow:
    when:
      notVisible:
        id: "home-route"
    commands:
      - extendedWaitUntil:
          visible:
            id: "home-route"
          timeout: 40000

# home-route is now visible but the home screen is still loading (collections
# fetch + FR-009 check in progress). The ActivityIndicator is an ongoing
# animation — waitForAnimationToEnd waits until it stops, meaning loading is
# done AND FR-009 has either confirmed no redirect (isFr009Checked=true,
# create-button appears) or redirected to the collection screen (home unmounts,
# collection screen renders its static content).
- waitForAnimationToEnd:
    timeout: 30000

# If FR-009 redirected to the default collection screen, navigate back to home.
- runFlow:
    when:
      visible:
        id: "collection-screen-add-movie"
    commands:
      - tapOn:
          id: "nav-home"
      # New home screen instance mounts and loads (brief spinner while collections
      # reload and FR-009 re-checks; isAutoNavDone() returns true → isFr009Checked
      # is set quickly → create-button appears → spinner stops).
      - waitForAnimationToEnd:
          timeout: 20000

# home-screen-create-button is the stable "home is fully ready" signal.
# It only appears after FR-009 has completed without redirecting.
- extendedWaitUntil:
    visible:
      id: "home-screen-create-button"
    timeout: 15000
