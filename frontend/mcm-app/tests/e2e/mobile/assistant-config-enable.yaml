appId: com.grumpyrobot.mcmapp
---
# T046 (mobile, US2): enable + bring-your-own credentials → dock appears → one interaction.
# Mobile leg of tests/e2e/web/assistant-config.spec.ts "configure (Ollama + TMDB) + save".
#
# Configures from the Profile form using the user's OWN credentials (no shared key — SC-002):
#   provider=Ollama + the emulator-reachable base URL + a TMDB key (from a CI secret env var).
# Validate-on-save probes both live; on success the dock mounts and a real query streams a reply
# using the per-user creds (X-Agent-Config → gateway model + per-run X-TMDB-Key).
#
# IMPORTANT (research R15): drive the dock IN-APP from home, never a deep-load.
# Requires: full agent stack (HANDOFF.md) + Ollama reachable from the emulator + adb reverse
#   tcp:8081 + tcp:8099. Env: E2E_TEST_USER, E2E_TEST_PASSWORD, OLLAMA_BASE_URL (e.g.
#   http://10.0.2.2:11434), TMDB_API_KEY (CI secret — never committed).
# Run: scripts/maestro-run.sh tests/e2e/mobile/assistant-config-enable.yaml --env OLLAMA_BASE_URL=http://10.0.2.2:11434

- launchApp:
    stopApp: true
    clearState: true
- runFlow: "_login-helper.yaml"
- extendedWaitUntil:
    visible:
      id: "home-screen-create-button"
    timeout: 20000

# ── Profile → assistant config: enable, Ollama URL, TMDB key, Save. ──
- tapOn:
    id: "nav-profile"
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 10000
- scrollUntilVisible:
    element:
      id: "assistant-config-enabled-toggle"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "assistant-config-enabled-toggle"
- tapOn:
    id: "assistant-config-provider-ollama"
- tapOn:
    id: "assistant-config-ollama-url-input"
- inputText: "${OLLAMA_BASE_URL}"
- pressKey: Back
- scrollUntilVisible:
    element:
      id: "assistant-config-tmdb-key-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "assistant-config-tmdb-key-input"
- inputText: "${TMDB_API_KEY}"
- pressKey: Back
- scrollUntilVisible:
    element:
      id: "assistant-config-save"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "assistant-config-save"
- extendedWaitUntil:
    visible:
      id: "assistant-config-banner"
    timeout: 20000

# ── Dock now mounts; a real interaction streams a reply on the per-user creds. ──
- tapOn:
    id: "nav-home"
- extendedWaitUntil:
    visible:
      id: "assistant-dock-toggle"
    timeout: 20000
- tapOn:
    id: "assistant-dock-toggle"
- extendedWaitUntil:
    visible:
      id: "assistant-dock-panel"
    timeout: 10000
- tapOn:
    id: "assistant-dock-input"
- inputText: "how many movies are in my collection"
- pressKey: Back
- tapOn:
    id: "assistant-dock-send"
- extendedWaitUntil:
    visible:
      id: "assistant-msg-assistant"
    timeout: 150000
