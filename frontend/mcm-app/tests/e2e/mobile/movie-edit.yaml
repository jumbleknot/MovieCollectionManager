appId: com.jumbleknot.mcmapp
---
# T106 (mobile): Edit an optional movie field and verify the change persists.
# Self-contained: creates its own movie so it does not depend on prior test state.
# Requires: full stack running (Keycloak + BFF + mc-service + MongoDB + Expo)
# Env vars: E2E_TEST_USER, E2E_TEST_PASSWORD
# Run: maestro test movie-edit.yaml --env E2E_TEST_USER=testuser --env E2E_TEST_PASSWORD=TestPass1!ok

- launchApp:
    clearState: true
- runFlow: "_login-helper.yaml"

# Navigate to collection (handles FR-009 auto-redirect and manual navigation)
- runFlow: "_navigate-to-collection-helper.yaml"

# ── Setup: create a movie and land on its detail screen ───────────────────────
- runFlow: "_create-movie-helper.yaml"

# Verify we're on the detail screen for the newly created movie
- assertVisible: "E2E Test Movie"

# Tap Edit button
- tapOn:
    id: "movie-detail-edit-button"

# Movie form opens in edit mode
- extendedWaitUntil:
    visible:
      id: "movie-form-title-input"
    timeout: 10000

# Toggle "owned" on and set media format
- tapOn:
    id: "movie-form-owned-toggle"

# The ownedMedia picker should now be visible
- extendedWaitUntil:
    visible:
      id: "movie-form-owned-media-picker"
    timeout: 5000

# Save changes
- tapOn:
    id: "movie-form-submit-button"

# Should return to detail view with owned showing "Yes"
- extendedWaitUntil:
    visible:
      id: "movie-detail-title"
    timeout: 15000
- assertVisible: "E2E Test Movie"
- assertVisible: "Yes"

# Teardown: delete the test movie so subsequent runs are idempotent
- scrollUntilVisible:
    element:
      id: "movie-detail-delete-button"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "movie-detail-delete-button"
- extendedWaitUntil:
    visible:
      id: "delete-dialog"
    timeout: 5000
- tapOn:
    id: "delete-dialog-confirm-button"
# Verify navigation back to collection screen confirms deletion succeeded
- extendedWaitUntil:
    visible:
      id: "collection-screen-add-movie"
    timeout: 10000
