appId: com.grumpyrobot.mcmapp
---
# T048 (mobile, 013 US6): navigate to a specific MOVIE across the user's collections.
# Mirror of tests/e2e/web/agent-navigate-movie.spec.ts. "open <movie>" with no collection named →
# supervisor routes `navigate` → navigator resolves the movie across ALL collections (pure code) →
# navigate_to_movie → BFF ui-action authorize → expo-router lands on that movie's detail screen.
#
# Uses the fixture movie "Epsilon" (in the web-seeded "E2E Browse" collection — server-side, so it
# survives the client logout). Drives the full live stack: CopilotKit dock → BFF /run → gateway
# (production nodes) → Ollama classify → navigator → movie-mcp → UI-action dispatch → router.push.
#
# IMPORTANT (R15): the dock is driven IN-APP from home — never deep-load a collection first.
#
# Requires: full agent stack; the app uses Metro's BFF (:8081), which forwards /agent/run to its
# AGENT_GATEWAY_URL (127.0.0.1:8123). Bring the gateway up on :8123 via the stack-native profile:
#   docker compose -p mcm -f infrastructure-as-code/docker/stacks/mcm.compose.yaml --profile agents-metro up -d
# adb reverse tcp:8081 + tcp:8099. Logged-out start. Env: E2E_TEST_USER, E2E_TEST_PASSWORD.

# Independent state (CLAUDE.md): clear + stop so each flow starts logged-OUT and _login-helper
# (which requires the login screen) works in the back-to-back CI suite. The per-user agent config
# lives server-side, so it survives clearState — the dock is still runnable after re-login.
- launchApp:
    stopApp: true
    clearState: true
- runFlow: "_login-helper.yaml"
- extendedWaitUntil:
    visible:
      id: "home-screen-create-button"
    timeout: 20000

# Open the assistant dock (app-wide overlay).
- tapOn:
    id: "assistant-dock-toggle"
- extendedWaitUntil:
    visible:
      id: "assistant-dock-panel"
    timeout: 10000

# "open <movie> in <collection>" → the unified search SCOPES to the named collection (013 US7/New
# Scope 1; Bug 1 — no longer searches across all) → navigate_to_movie → router.push opens its detail.
- tapOn:
    id: "assistant-dock-input"
- inputText: "open Epsilon in E2E Browse"
- pressKey: Back
- tapOn:
    id: "assistant-dock-send"

- extendedWaitUntil:
    visible:
      id: "movie-detail-title"
    timeout: 150000
- assertVisible:
    text: ".*Epsilon.*"
