appId: com.grumpyrobot.mcmapp
---
# T137 (mobile): Browse movie collection — list loads, search bar and filter panel visible.
# Requires: full stack running (Keycloak + BFF + mc-service + MongoDB + Expo)
# Requires env vars: E2E_TEST_USER, E2E_TEST_PASSWORD, E2E_COLLECTION_NAME
# Run: scripts/maestro-run.sh tests/e2e/mobile/movie-browse.yaml --env E2E_COLLECTION_NAME="My Movies"

- launchApp:
    stopApp: false
    clearState: false
- runFlow: "_login-helper.yaml"

# Navigate to collection (handles FR-009 auto-redirect and manual navigation)
- runFlow: "_navigate-to-collection-helper.yaml"

# Wait for collection screen to load
- extendedWaitUntil:
    visible:
      id: "movie-search-input"
    timeout: 8000

# Verify the movie list area is rendered.
# movie-list-container shows when movies exist; movie-list-empty shows otherwise.
# We can't assert both — just let the screen settle and verify UI elements instead.
- waitForAnimationToEnd:
    timeout: 3000

# Verify the search bar is visible
- assertVisible:
    id: "movie-search-input"

# Verify the Add Movie button is present
- assertVisible:
    id: "collection-screen-add-movie"

# Verify column toggles are visible. year/contentType are always-on and no longer
# toggleable (FR-019b); assert the leftmost toggleable column (Language) instead.
- assertVisible:
    id: "column-toggle-language"

# Verify column header row is visible (always shown above movie list, even when empty)
- assertVisible:
    id: "movie-list-header"

# Verify filter panel is present
- assertVisible:
    id: "movie-filter-panel"
