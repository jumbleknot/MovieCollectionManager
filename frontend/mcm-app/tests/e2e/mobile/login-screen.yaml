appId: com.jumbleknot.mcmapp
---
# T-001: Login screen shows expected elements on first launch.
- launchApp:
    stopApp: false
    clearState: false
# Wait for the login screen to fully render — timing varies across test runs
# depending on Metro bundle cache state and emulator load.
- extendedWaitUntil:
    visible:
      id: "login-screen"
    # 60 s covers Metro cold-start (no bundle cache) on the test emulator.
    timeout: 60000
- assertVisible: "Movie Collection Manager"
- assertVisible:
    id: "btn-login-with-keycloak"
- assertVisible:
    id: "link-create-account"
