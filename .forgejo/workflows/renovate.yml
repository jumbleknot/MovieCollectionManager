# Renovate — scheduled dependency-update bot (DRAFT 2026-07-05).
#
# Runs nightly on the self-hosted Forgejo act_runner, scans jumbleknot/mcm, and opens PRs bumping
# upstream deps (Docker base images, Cargo, Python, non-RN npm, CI actions) per renovate.json. Those
# PRs go through guardrails + app-ci like any other; cd-deploy only fires on merge to main, so nothing
# auto-deploys. React Native / Expo are excluded in renovate.json (Expo upgrades go through the expo
# upgrade skill, not raw bumps).
#
# OPERATOR PREREQUISITE (one-time, NOT in git — same pattern as CD_PUSH_TOKEN / REGISTRY_TOKEN):
#   Create a Forgejo PAT `renovate` and add it as the Forgejo Actions secret RENOVATE_TOKEN. Scopes
#     (all six — Renovate needs each; a missing one surfaces as a 403 for that specific call):
#       read:user          — GET /user at init to identify the bot account
#       read:organization  — org/preset lookups
#       read:repository + write:repository — read repo + open PR branches
#       read:issue + write:issue           — manage the Dependency Dashboard issue (and PRs, which
#                                            Forgejo models as issues)
#   OPTIONAL: add a read-only github.com PAT (no scopes needed) as secret RENOVATE_GITHUB_COM_TOKEN so
#   Renovate can look up github-actions versions + changelogs without hitting api.github.com's anon rate
#   limit. NB the secret is named with the RENOVATE_ prefix (NOT GITHUB_): Forgejo reserves the GITHUB_/
#   GITEA_/FORGEJO_ prefixes for secret+env names, and Renovate reads RENOVATE_GITHUB_COM_TOKEN natively.
#   The env line below is already wired — it's an empty no-op until the secret exists.
#   NOTE: Renovate logs "Detected Forgejo instance, please use 'forgejo' platform" — the `gitea`
#   platform works (Forgejo is API-compatible); switching to `forgejo` later is a nicety, not required.
#   (No endpoint var needed: the API base is derived from ${{ github.server_url }} — the same forge
#   URL the runner uses for actions/checkout — so it's reachable by construction and never a host
#   literal in git. If your Forgejo populates github.server_url without /api, the line below appends it.)
#
# VALIDATE BEFORE TRUSTING: trigger manually with dryRun=true (RENOVATE_DRY_RUN=full) and read the log —
# it lists the PRs it WOULD open without creating them. Then flip to a real run.
name: renovate

on:
  schedule:
    - cron: '0 3 * * *' # nightly 03:00 UTC (matches the renovate.json schedule window)
  workflow_dispatch:
    inputs:
      dryRun:
        description: 'Dry run (log the PRs it would open, create nothing)'
        type: boolean
        default: true

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    # Run Renovate via npx INSIDE the runner's default node:22-bookworm container (which is how the
    # act_runner containerizes `ubuntu-latest` jobs). We deliberately do NOT use a job-level
    # `container: renovate/renovate` — none of the other workflows do, and container-on-container on
    # the rootless daemon fails at setup (the first draft did exactly that).
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Renovate runs the manifest bump AND regenerates the lockfile ("artifacts" step) as child
      # processes using tools on PATH (binarySource=global for an npx install). The bare node:22-bookworm
      # runner has neither pnpm nor cargo, so lockfile regen failed → `renovate/artifacts` red and PRs
      # shipped with a STALE lockfile. Since app-ci enforces `pnpm install --frozen-lockfile`, a stale
      # pnpm-lock.yaml then cascades every downstream job (that was the react-monorepo PR breakage).
      # Provide both toolchains here — mirroring guardrails.yml (pnpm via corepack) and app-ci's
      # mc-service-checks (rustup minimal) — so Renovate can refresh pnpm-lock.yaml AND Cargo.lock.
      - name: Enable pnpm (corepack, version from package.json packageManager)
        run: corepack enable
      - name: Install Rust (cargo, for Cargo.lock maintenance)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Run Renovate
        env:
          # Non-interactive corepack provisioning (avoid the first-use download prompt hanging the job).
          COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
          # Forgejo is Gitea-API-compatible; the `gitea` platform is the most battle-tested path.
          RENOVATE_PLATFORM: gitea
          # API base derived from the runner-injected instance URL (the same host actions/checkout uses)
          # → reachable by construction, no host literal in git, no operator var to set.
          RENOVATE_ENDPOINT: ${{ github.server_url }}/api/v1/
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_REPOSITORIES: jumbleknot/mcm
          RENOVATE_AUTODISCOVER: 'false'
          # Read-only github.com PAT for changelog + github-actions version lookups (anti-rate-limit).
          # RENOVATE_-prefixed to dodge Forgejo's reserved GITHUB_ prefix; empty no-op until the secret exists.
          RENOVATE_GITHUB_COM_TOKEN: ${{ secrets.RENOVATE_GITHUB_COM_TOKEN }}
          # workflow_dispatch dryRun input → full dry run; scheduled runs are live.
          RENOVATE_DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dryRun) && 'full' || '' }}
          LOG_LEVEL: info
        # npx pulls the renovate package into the node runner. Pin (renovate@<major>) after the first
        # green run for reproducibility.
        run: npx --yes renovate
      # Feature 042 — publish an agent-readable failure digest. The forge API exposes no log or
      # artifact endpoint, so each job PUSHES a distilled, redacted digest into a channel the API can
      # already read (a PR comment, or a commit status on push).
      # `always()` + `continue-on-error` + an unconditional exit 0 inside the script: a broken digest
      # must NEVER mask, replace or delay the real job result (FR-009). `job.status` carries
      # `cancelled` for a superseded run, which the script suppresses rather than publishing as a
      # failure for a commit that was never broken (FR-001a).
      - name: Publish failure digest
        if: always()
        continue-on-error: true
        env:
          CI_DIGEST_TOKEN: ${{ secrets.CI_DIGEST_TOKEN }}
          CI_DIGEST_JOB_STATUS: ${{ job.status }}
        run: node scripts/ci-failure-digest.mjs
