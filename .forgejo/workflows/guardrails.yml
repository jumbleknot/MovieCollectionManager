# Feature 023 (US1, MVP) — homelab port of the three GitHub guardrail workflows:
#   .github/workflows/naming-gate.yml + secret-scan.yml + agent-gates.yml  →  three jobs here.
# These are the cheap, KEYLESS gates that run on every push/PR and gate the commit, identical to
# GitHub Actions today (FR-001, FR-002, FR-003).
#
# ACTION-LIGHT by design: the only `uses:` is `actions/checkout` (mirrored on the instance's default
# action registry), so this workflow runs on the homelab runner WITHOUT pointing action resolution at
# github. Toolchain setup is plain shell on the `node:22-bookworm` runner image: pnpm via corepack
# (pinned by package.json `packageManager`), uv via its installer. Path scoping from the original
# separate workflows is intentionally dropped — all three gate jobs run on every push (they are cheap
# and keyless; running unconditionally is strictly safer than path-scoping).
#
# No credential LITERAL appears in this file, and every gate job remains keyless in the sense that
# matters — the agent golden gate runs in replay mode against cassettes, with no model key, no
# network and no provider credential. That is the property FR-004 / SC-009 of feature 023 actually
# require: credentials must come from the forge's CI secret store, never from a committed literal.
#
# Feature 042 adds ONE referenced secret, `CI_DIGEST_TOKEN`, to publish failure digests. It is
# compliant with FR-004 by construction (it IS a secret-store reference) and is purpose-scoped to
# write:issue + write:package — it cannot push code and cannot touch protected `main`. An earlier
# revision of this comment claimed no `${{ secrets }}` was referenced at all; that was a description
# of how the file happened to look, not a requirement, and it is no longer true.
#
# The file passes the gates it itself runs.
name: guardrails

on:
  workflow_dispatch: {}
  push:
  pull_request:

concurrency:
  group: guardrails-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Ported from secret-scan.yml — whole-tree (FR-002). Pure node built-ins; no install needed.
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate the scanner detects planted keys (and clean tree passes)
        run: node scripts/secret-scan.mjs --selftest
      - name: Scan committed files for credential-shaped strings
        run: bash scripts/ci-log-step.sh secret-scan node scripts/secret-scan.mjs
      # Feature 042 — publish an agent-readable failure digest. The forge API exposes no log or
      # artifact endpoint, so each job PUSHES a distilled, redacted digest into a channel the API can
      # already read (a PR comment, or a commit status on push).
      # `always()` + `continue-on-error` + an unconditional exit 0 inside the script: a broken digest
      # must NEVER mask, replace or delay the real job result (FR-009). `job.status` carries
      # `cancelled` for a superseded run, which the script suppresses rather than publishing as a
      # failure for a commit that was never broken (FR-001a).
      - name: Publish failure digest
        if: always()
        continue-on-error: true
        env:
          CI_DIGEST_TOKEN: ${{ secrets.CI_DIGEST_TOKEN }}
          CI_DIGEST_JOB_STATUS: ${{ job.status }}
        run: node scripts/ci-failure-digest.mjs

  # Ported from naming-gate.yml — resource-naming + inline-secret gates (FR-001). Needs `yaml` →
  # pnpm install.
  naming:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Enable pnpm (corepack, version from package.json packageManager)
        run: corepack enable
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Resource-naming gate (all sections)
        run: node scripts/check-resource-naming.mjs --section=all
      - name: Inline-secret gate (selftest + scan)
        run: |
          node scripts/check-no-inline-secrets.mjs --selftest
          node scripts/check-no-inline-secrets.mjs
      - name: Komodo-sync topology gate (selftest + scan — no host/domain/IP literal in komodo/*.toml)
        run: |
          node scripts/check-komodo-sync.mjs --selftest
          node scripts/check-komodo-sync.mjs
      - name: Topology-scrub gate (selftest + scan — no real tailnet *.ts.net host tree-wide)
        run: |
          node scripts/check-topology-scrub.mjs --selftest
          node scripts/check-topology-scrub.mjs
      - name: Argv-secret gate (selftest + scan — no --env <credential>= to the Maestro test runner)
        run: |
          node scripts/check-no-argv-secrets.mjs --selftest
          node scripts/check-no-argv-secrets.mjs
      - name: Prod↔CI port-collision gate (selftest + scan — no prod published port overlaps a CI/dev one)
        run: |
          node scripts/check-prod-ci-port-collision.mjs --selftest
          node scripts/check-prod-ci-port-collision.mjs
      - name: Prod restart-policy gate (selftest + scan — every prod service uses restart always, feature 030)
        run: |
          node scripts/check-prod-restart-policy.mjs --selftest
          node scripts/check-prod-restart-policy.mjs
      - name: CI-digest coverage gate (selftest + scan — every job publishes a failure digest, feature 042)
        run: |
          node scripts/check-ci-digest-coverage.mjs --selftest
          node scripts/check-ci-digest-coverage.mjs
      - name: DAST gate selftest (feature 031 — check-dast-findings fail/suppress/clean paths proven each push)
        run: node scripts/check-dast-findings.mjs --selftest
      - name: Realm-consistency gate (feature 039 — dev-realm.json ⟷ ci-realm.json client/user contract stays in lockstep)
        run: |
          node scripts/check-realm-consistency.mjs --selftest
          node scripts/check-realm-consistency.mjs
      # Feature 041: scripts/__tests__ ran in NO workflow, so the unit tests behind the gate scripts
      # rotted unnoticed — sast-scan.guard.test.mjs could not even import (`ajv` was never a root dep),
      # i.e. a guard test that was silently 0%-executed. Same false-green class this feature removes.
      # Unquoted glob on purpose: bash expands it, so this does not depend on the runner's Node having
      # `--test` glob support (and `node --test <dir>` does not discover `__tests__/`).
      - name: Script unit tests (scripts/__tests__ — the gate scripts' own guards)
        run: bash scripts/ci-log-step.sh naming-script-tests node --test scripts/__tests__/*.test.mjs
      # Feature 042 — publish an agent-readable failure digest. The forge API exposes no log or
      # artifact endpoint, so each job PUSHES a distilled, redacted digest into a channel the API can
      # already read (a PR comment, or a commit status on push).
      # `always()` + `continue-on-error` + an unconditional exit 0 inside the script: a broken digest
      # must NEVER mask, replace or delay the real job result (FR-009). `job.status` carries
      # `cancelled` for a superseded run, which the script suppresses rather than publishing as a
      # failure for a commit that was never broken (FR-001a).
      - name: Publish failure digest
        if: always()
        continue-on-error: true
        env:
          CI_DIGEST_TOKEN: ${{ secrets.CI_DIGEST_TOKEN }}
          CI_DIGEST_JOB_STATUS: ${{ job.status }}
        run: node scripts/ci-failure-digest.mjs

  # Ported from agent-gates.yml — KEYLESS agent quality gates (FR-003). The golden-pair gate runs in
  # REPLAY mode (cassettes, no ANTHROPIC_API_KEY, no network, no model). Needs pnpm + uv.
  agent-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Enable pnpm (corepack)
        run: corepack enable
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint (ruff + mypy)
        run: bash scripts/ci-log-step.sh agent-gates-lint pnpm nx lint movie-assistant
      - name: Unit tests (incl. SC-004 token-leak scan)
        run: bash scripts/ci-log-step.sh agent-gates-test pnpm nx test movie-assistant
      - name: Golden-pair gate (cassette replay — keyless, drift-proof)
        env:
          LLM_CASSETTE_MODE: replay
        run: bash scripts/ci-log-step.sh agent-gates-golden pnpm nx test:golden movie-assistant
      # Feature 042 — publish an agent-readable failure digest. The forge API exposes no log or
      # artifact endpoint, so each job PUSHES a distilled, redacted digest into a channel the API can
      # already read (a PR comment, or a commit status on push).
      # `always()` + `continue-on-error` + an unconditional exit 0 inside the script: a broken digest
      # must NEVER mask, replace or delay the real job result (FR-009). `job.status` carries
      # `cancelled` for a superseded run, which the script suppresses rather than publishing as a
      # failure for a commit that was never broken (FR-001a).
      - name: Publish failure digest
        if: always()
        continue-on-error: true
        env:
          CI_DIGEST_TOKEN: ${{ secrets.CI_DIGEST_TOKEN }}
          CI_DIGEST_JOB_STATUS: ${{ job.status }}
        run: node scripts/ci-failure-digest.mjs

  # Feature 033 — blocking SAST + SCA static scan (KEYLESS; no ${{ secrets }}). Semgrep code-SAST over
  # the TS/JS + Python surfaces, plus cargo/pnpm/pip dependency audits, normalized to one Critical/High/
  # Medium/Low scale and gated against security/sast/allowlist.yaml (the baseline). Fails on any
  # un-allowlisted High/Critical *blocking* finding (SAST, or runtime-scope SCA). SCA runs FULL every
  # time — a newly-published advisory can hit an unchanged dep, so it is deliberately NOT path-gated
  # (FR-013). Semgrep is full-tree on push (baseline) and changed-files on PRs (FR-014). Rust is the one
  # toolchain the runner image lacks, so cargo-audit is installed fresh (actions/cache is not mirrored
  # on this runner — a monthly binary+advisory-db cache is a future optimization).
  sast:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout (full history so the PR-base diff for changed-scope resolves)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Ensure the PR base ref is available for the changed-files diff
        if: ${{ github.event_name == 'pull_request' }}
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git fetch --no-tags --depth=200 origin "$BASE_REF" || true
      - name: Enable pnpm (corepack)
        run: corepack enable
      - name: Install native build deps (cargo-audit compiles native code)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends build-essential pkg-config libssl-dev
      - name: Install uv (Semgrep via uvx + pip-audit)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install Rust + cargo-audit
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/cargo" install cargo-audit --locked
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Sync the Python agent env (pip-audit audits the installed venv, not a requirements file)
        run: uv sync --frozen
        working-directory: agents/movie-assistant
      - name: Gate selftest (prove fail/suppress/expiry paths before the real scan)
        run: node scripts/check-sast-findings.mjs --selftest
      - name: Static scan (Semgrep changed-scope on PRs / full on push; SCA always full)
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            node scripts/sast-scan.mjs --scope changed --base "origin/$BASE_REF"
          else
            node scripts/sast-scan.mjs --scope full
          fi
      - name: Gate — fail on any un-allowlisted High/Critical blocking finding
        run: bash scripts/ci-log-step.sh sast-gate node scripts/check-sast-findings.mjs
      - name: Upload scan reports (findings.json + SARIF + summary + native)
        if: ${{ always() }}
        uses: actions/upload-artifact@ff15f0306b3f739f7b6fd43fb5d26cd321bd4de5 # v3
        with:
          name: sast-report
          path: security/sast/reports/
      # Feature 042 — publish an agent-readable failure digest. The forge API exposes no log or
      # artifact endpoint, so each job PUSHES a distilled, redacted digest into a channel the API can
      # already read (a PR comment, or a commit status on push).
      # `always()` + `continue-on-error` + an unconditional exit 0 inside the script: a broken digest
      # must NEVER mask, replace or delay the real job result (FR-009). `job.status` carries
      # `cancelled` for a superseded run, which the script suppresses rather than publishing as a
      # failure for a commit that was never broken (FR-001a).
      - name: Publish failure digest
        if: always()
        continue-on-error: true
        env:
          CI_DIGEST_TOKEN: ${{ secrets.CI_DIGEST_TOKEN }}
          CI_DIGEST_JOB_STATUS: ${{ job.status }}
        run: node scripts/ci-failure-digest.mjs
