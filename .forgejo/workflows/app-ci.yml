# Feature 023 (US2) — full application CI on the homelab forge. Ports .github/workflows/android-e2e.yml
# (Metro-less mobile agent E2E against the containerized stack) and folds in an nx-affected
# lint/build/unit stage that consumes the self-hosted Nx remote cache (T004/T011).
#
# What runs (FR-005..FR-010):
#   job `affected` : nx affected lint/build/test (remote-cache-backed; unaffected projects skipped)
#   job `app-e2e`  : provision env (gen-dev-secrets + gen-ci-env + ci-realm import) → bring up
#                    auth→mcm stacks → dev BFF (:8082) → containerized agent gateway+MCP → full web
#                    Playwright E2E (dev-container) → build release APK → 8 Maestro agent flows
#                    per-file on a KVM emulator → upload diagnostics on failure.
#
# Provisioning closes the original android-e2e "BLOCKED (ci-provisioning)" gap: gen-ci-env.mjs writes
# the gitignored env/secret files from Forgejo secrets, and ci-realm.json is imported on Keycloak boot
# (compose.ci.yaml) — no manual host prep (FR-006).
name: app-ci

on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'Agent model provider (anthropic recommended in CI; ollama needs a model pull)'
        type: choice
        options: [anthropic, ollama]
        default: anthropic
  # push only on main (merges) — feature branches are gated via `pull_request`, so a branch push with an
  # open PR no longer runs app-ci twice. A main push also drives trigger-cd → cd-deploy.
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'agents/**'
      - 'mcp-servers/**'
      - 'backend/**'
      - 'packages/**'                     # @mcm/design-system — was ungated (a DS-only PR bypassed app-ci)
      - 'infrastructure-as-code/**'
      - '.forgejo/workflows/app-ci.yml'
      - 'Cargo.lock'                      # a lockfile bump changes transitive deps → rebuild the affected images
      - 'pnpm-lock.yaml'
  # NO `paths:` filter — app-ci runs on EVERY PR (branch-protection Option 2, 2026-07-07). Rationale:
  # branch protection requires the `app-ci*` checks, but a path-filtered app-ci left non-app PRs (docs,
  # config, lockfiles) with ZERO `app-ci/*` status → the required glob was unmet → unmergeable without an
  # admin override (this bit #30/#31 config, #36/#37 lockfiles, #39 docs — whack-a-mole per class). Running
  # app-ci on every PR makes the required contexts always PRESENT so any PR is mergeable by check. The
  # heavy `app-e2e` (~23 min) is STILL gated — by the `changes` dorny paths-filter job below — so a docs/
  # config/lockfile PR runs only the light `affected` + `mc-service-checks` jobs, not the E2E suite.
  # PAIRED with a branch-protection change: required checks must list the app-ci jobs EXCEPT `trigger-cd`
  # (a push-only job that leaves an orphaned `pending` on PRs) — see
  # docs/proposals/homelab-setup/branch-protection-required-checks-cleanup.md. Do the BP change FIRST.
  # `push:` (main) keeps its paths filter — a docs/config merge to main should NOT trigger cd-deploy.
  pull_request:

concurrency:
  group: app-ci-${{ github.ref }}
  cancel-in-progress: true

# Self-hosted Nx remote cache (T004, research R2). Driven entirely by env — no nx.json literal; with
# the vars/secret unset (e.g. a local run) Nx silently falls back to the local cache.
env:
  NX_SELF_HOSTED_REMOTE_CACHE_SERVER: ${{ vars.NX_SELF_HOSTED_REMOTE_CACHE_SERVER }}
  NX_SELF_HOSTED_REMOTE_CACHE_ACCESS_TOKEN: ${{ secrets.NX_SELF_HOSTED_REMOTE_CACHE_ACCESS_TOKEN }}

jobs:
  # ── Change detection (CI efficiency, 2026-07-03) ──────────────────────────────────────────────
  # The expensive app-e2e suite (~23 min: APK + emulator + web Playwright) used to run on EVERY app-ci
  # trigger — including infrastructure-as-code/komodo/*.toml and compose-comment changes that can't
  # affect the app. This filter gates app-e2e to paths that actually change app RUNTIME behaviour, so a
  # Komodo/deploy-config change runs only the cheap nx-affected job. The cheap `affected` + guardrails
  # still run on everything; only the heavy suite is scoped.
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            app:
              - 'frontend/**'
              - 'agents/**'
              - 'mcp-servers/**'
              - 'backend/**'
              - 'packages/**'
              - 'infrastructure-as-code/docker/**'   # compose/Docker configs the E2E stacks bring up
              - '.forgejo/workflows/app-ci.yml'       # changes to app-ci itself must re-run the full suite
              - 'security/zap/**'                      # feature 031: DAST scan config re-runs the dast job
              - 'scripts/zap-scan.mjs'                 # feature 031: the scan runner
              - 'scripts/check-dast-findings.mjs'      # feature 031: the gate script
              # NOTE: infrastructure-as-code/komodo/** deliberately excluded — Komodo deploy config does
              # not affect what app-e2e exercises (it's reconciled by the ResourceSync webhook, not E2E).

  # ── nx-affected lint/build/unit (FR-005) ──────────────────────────────────────────────────────
  # Compares against origin/main so only projects changed on this branch are linted/built/tested;
  # the remote cache makes a no-op re-run a cache hit (RED→GREEN, T004). The self-hosted runner
  # provides the polyglot toolchains (Rust/cargo, Java) per Server-Setup-Runbook §2; node/pnpm/uv
  # are set up here.
  affected:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Ensure origin/main is available as the affected base
        run: git fetch --no-tags --depth=200 origin main || true
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20, cache: pnpm }
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          # Authenticate the GitHub API call that resolves uv "latest" — the Forgejo runner has no GitHub
          # token, so the anonymous call hits the 60/hr rate limit and fails ("Set up uv", cd-deploy 2026-07-06).
          # RENOVATE_GITHUB_COM_TOKEN is the repo's read-only github.com PAT (also used by renovate.yml).
          github-token: ${{ secrets.RENOVATE_GITHUB_COM_TOKEN }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # `build` is a docker IMAGE build for every project (that's cd-deploy's job + needs Docker-in-
      # job) — excluded from this fast gate. mc-service is excluded too: its lint/test need the Rust
      # toolchain + a replica-set Mongo (integration tests) this lightweight container has no business
      # standing up; its image is compiled + validated in cd-deploy. JS/Python projects (mcm-app,
      # movie-assistant, the MCP servers) run lint + unit here on node + uv (matches the old CI scope).
      - name: nx affected — lint + unit (remote-cache-backed)
        run: pnpm nx affected --target=lint,test --base=origin/main --head=HEAD --exclude=mc-service

  # ── mc-service Rust checks (clippy + unit tests) ──────────────────────────────────────────────
  # Runs in the container runner. clippy (-D warnings) + `cargo test --lib` (unit only — the
  # integration tests need a replica-set Mongo and are NOT run here). Routed through Nx
  # (constitution). This is Rust coverage the old GitHub CI did not have.
  mc-service-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install native build deps (openssl for native-tls)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends build-essential pkg-config libssl-dev
      - name: Install Rust (stable + clippy)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --component clippy
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20, cache: pnpm }
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: clippy (deny warnings)
        run: pnpm nx lint mc-service
      - name: Unit tests (--lib; no Mongo)
        run: pnpm nx test:unit mc-service

  # ── Containerized web + mobile agent E2E (FR-006..FR-010) ─────────────────────────────────────
  app-e2e:
    needs: [affected, changes]
    # Skip the ~23-min suite when no app-runtime path changed (e.g. a Komodo/deploy-config-only change).
    # trigger-cd tolerates a SKIPPED app-e2e (it gates on result != failure), so deploys still proceed.
    if: ${{ needs.changes.outputs.app == 'true' }}
    # HOST execution (not a container): the android-e2e port relies on localhost:8082 (web E2E → dev
    # BFF) and 10.0.2.2:8082 (emulator → host) resolving like a single host, plus KVM + the ci docker
    # daemon — none of which work from a rootless job container. A host-type runner label (defined as
    # `kvm:host`; `runs-on` uses the label NAME `kvm`) runs the job directly on the ci host, the way
    # GitHub's VM did (Server-Setup-Runbook Phase 7 anticipated this).
    runs-on: kvm
    timeout-minutes: 75
    env:
      # Reach the ci user's rootless Docker daemon (adjust 1001 if `id -u ci` differs).
      DOCKER_HOST: unix:///run/user/1001/docker.sock
      # EXPO_PUBLIC_* are inlined into the JS bundle at build time. Keycloak pins its issuer to
      # localhost:8099 (KC_HOSTNAME), so the app must reach Keycloak AND the BFF at localhost — not
      # 10.0.2.2 — or the token issuer mismatches and login never completes (CLAUDE.md mobile issuer
      # note; android-e2e's 10.0.2.2 was never green). The emulator step `adb reverse`s 8082/8099.
      EXPO_PUBLIC_BFF_NATIVE_URL: http://localhost:8082
      EXPO_PUBLIC_KEYCLOAK_NATIVE_URL: http://localhost:8099
      E2E_BFF_TARGET: dev-container
      E2E_AGENT_PRODUCTION: '1'
      MODEL_PROVIDER: ${{ github.event.inputs.provider || vars.MODEL_PROVIDER || 'anthropic' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      E2E_TEST_USER: ${{ secrets.E2E_TEST_USER }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      # web-api-mcp .env.local + the agent flows' per-user config (TMDB enrichment). Optional: the
      # per-user config supplies it per-request, but a real key lets the enrich/add flows return data.
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Agent images + Android SDK/NDK + Gradle caches exhaust the default runner disk. Free first.
      # Jobs run in a node:22-bookworm container on the ci rootless daemon — install the Docker CLI
      # (the image has none) and confirm it can reach the daemon socket the runner mounts.
      - name: Set up Docker CLI (job container talks to the runner's daemon socket)
        run: |
          if ! command -v docker >/dev/null 2>&1; then
            curl -fsSL https://download.docker.com/linux/static/stable/x86_64/docker-27.5.1.tgz \
              | tar xz -C /usr/local/bin --strip-components=1 docker/docker
          fi
          docker version --format 'client {{.Client.Version}}' || true
          if docker info >/dev/null 2>&1; then
            echo "docker daemon reachable from job container"
          else
            echo "::error::Docker CLI installed but the daemon is not reachable from the job container. Mount the ci rootless socket into job containers: in the runner config.yaml set container.options to include  -v /run/user/1001/docker.sock:/var/run/docker.sock  (alongside --device /dev/kvm), then restart the runner."
            exit 1
          fi

      - name: Free daemon disk space
        run: |
          docker image prune -af || true
          df -h || true

      # On the homelab runner the job runs inside a node:22-bookworm container on the ci rootless
      # daemon, so /dev/kvm is provided by the runner config (`container.options: --device /dev/kvm`),
      # NOT by a udev rule (that GitHub-host-VM approach doesn't apply in a container). Fail LOUD if
      # KVM is missing — never silently skip the mobile suite (spec Edge Cases, research R1).
      - name: Verify KVM is available
        run: |
          if [ -e /dev/kvm ]; then
            ls -l /dev/kvm
          else
            echo "::error::/dev/kvm not present in the job container — add 'container.options: --device /dev/kvm' to the runner config (Server-Setup-Runbook Phase 7) and ensure the ci user is in the kvm group"
            exit 1
          fi

      # The per-stack aggregators override `include:`d services to attach profiles; that needs a
      # recent Docker Compose (the bundled one rejects it). Install the latest plugin.
      - name: Install latest Docker Compose plugin
        run: |
          mkdir -p ~/.docker/cli-plugins
          curl -fsSL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 \
            -o ~/.docker/cli-plugins/docker-compose
          chmod +x ~/.docker/cli-plugins/docker-compose
          docker compose version

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20, cache: pnpm }
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
      # up-agents-prod (agent-stack.mjs) shells out to `uv` to fetch the gateway client secret from
      # Keycloak — needed on the host PATH (container jobs get it from the astral action; host doesn't).
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          # Authenticate the GitHub API call that resolves uv "latest" — the Forgejo runner has no GitHub
          # token, so the anonymous call hits the 60/hr rate limit and fails ("Set up uv", cd-deploy 2026-07-06).
          # RENOVATE_GITHUB_COM_TOKEN is the repo's read-only github.com PAT (also used by renovate.yml).
          github-token: ${{ secrets.RENOVATE_GITHUB_COM_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Provision the CI environment (FR-006, closes the android-e2e ci-provisioning gap) ────────
      # The runner is PERSISTENT (not an ephemeral VM), so Keycloak's realm DB + Mongo test data
      # survive across runs. Keycloak's --import-realm uses IGNORE_EXISTING, so a stale realm would
      # never pick up ci-realm.json changes, and stale Mongo data breaks E2E idempotency. Remove prior
      # app containers + the stateful data volumes each run (image build caches are preserved, so
      # rebuilds stay fast) → every run imports the current realm and seeds fixtures clean.
      - name: Reset stateful CI data (fresh realm + test data each run)
        run: |
          docker rm -f keycloak-service keycloak-store-postgres keycloak-mailpit \
            mc-service mc-service-store-mongo mc-service-store-mongo-rs-init \
            mcm-bff-service-nonsecure mcm-bff-cache-redis mcm-bff-store-mongo \
            movie-assistant-gateway movie-assistant-mcp-movie movie-assistant-mcp-webapi \
            movie-assistant-mcp-spreadsheet movie-assistant-store-postgres 2>/dev/null || true
          docker volume rm keycloak-store-postgres-data mc-service-store-mongo-data \
            mcm-bff-store-mongo-data movie-assistant-store-postgres-data 2>/dev/null || true

      - name: First-time docker setup (networks + volumes)
        run: |
          for n in backend-network keycloak-network movie-assistant-mcp-network; do docker network create "$n" || true; done
          # All external volumes the auth + mcm(app) + agents stacks declare by name (must pre-exist).
          for v in mc-service-store-mongo-data keycloak-store-postgres-data mcm-bff-cache-redis-data \
                   mcm-bff-store-mongo-data movie-assistant-store-postgres-data; do docker volume create "$v" || true; done

      - name: Mint per-stack secrets (stacks/*.env)
        run: node scripts/gen-dev-secrets.mjs

      # KC_DB_PASSWORD is no longer written here — feature 022 made it a single ${KC_DB_PASSWORD}
      # minted by gen-dev-secrets into stacks/auth.env (postgres + Keycloak both interpolate it; the
      # CI DB volume is wiped each run so a fresh value is fine). The Forgejo KC_DB_PASSWORD secret is
      # now unused and can be deleted from the Actions store.
      - name: Write CI env/secret files (.env.docker + web-api-mcp/.env.local)
        env:
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
          KEYCLOAK_SERVICE_CLIENT_SECRET: ${{ secrets.KEYCLOAK_SERVICE_CLIENT_SECRET }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          AGENT_SUBJECT_TOKEN_CLIENT_SECRET: ${{ secrets.AGENT_SUBJECT_TOKEN_CLIENT_SECRET }}
          AGENT_CONFIG_ENC_KEY: ${{ secrets.AGENT_CONFIG_ENC_KEY }}
        run: node scripts/gen-ci-env.mjs

      # ── Backend + agent stack (auth BEFORE mcm app profile — manual ordering, FR-006) ───────────
      - name: Bring up Keycloak (auth stack, ci-realm imported) + Redis + Mongo + mc-service
        env:
          # Feature 027 US5: ci-realm.json commits only ${ENV_VAR} placeholders; Keycloak resolves them
          # from the keycloak-service container env at import (compose.ci.yaml passes these through). The
          # 3 real client secrets come from Forgejo (same values .env.docker uses → realm==BFF by
          # construction); E2E_TEST_PASSWORD is already the job env. The 3 below are minted in the script.
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
          KEYCLOAK_SERVICE_CLIENT_SECRET: ${{ secrets.KEYCLOAK_SERVICE_CLIENT_SECRET }}
          AGENT_SUBJECT_TOKEN_CLIENT_SECRET: ${{ secrets.AGENT_SUBJECT_TOKEN_CLIENT_SECRET }}
        run: |
          # Throwaway per-run secrets for the CI-realm clients whose secret is ARBITRARY in app-e2e:
          # agent-gateway is refetched from Keycloak at runtime (agent-stack.mjs) and mc-service is
          # bearer-only. Random each run, never committed; they only need to be non-empty + internally
          # consistent within this realm.
          export AGENT_GATEWAY_CLIENT_SECRET="$(node -e 'process.stdout.write(require("crypto").randomBytes(32).toString("hex"))')"
          export MC_SERVICE_CLIENT_SECRET="$(node -e 'process.stdout.write(require("crypto").randomBytes(32).toString("hex"))')"
          # mcm-bff-test (ROPC) IS used now — the agent integration suite logs in through it (kc_admin
          # reads E2E_ROPC_CLIENT_SECRET). It is minted here and pinned into the realm import, so it must
          # be re-exported to later steps via $GITHUB_ENV or they would use a secret the realm never saw
          # (same as the dast job). Do NOT read it from stacks/auth.env — the realm imported THIS value.
          export E2E_ROPC_CLIENT_SECRET="$(node -e 'process.stdout.write(require("crypto").randomBytes(32).toString("hex"))')"
          echo "E2E_ROPC_CLIENT_SECRET=$E2E_ROPC_CLIENT_SECRET" >> "$GITHUB_ENV"
          # Absolute path so Compose mounts the FILE (a relative source resolves against the project
          # dir = stacks/, where the file isn't, and Docker would create an empty dir — see compose.ci.yaml).
          export CI_REALM_FILE="$PWD/infrastructure-as-code/docker/keycloak/ci-realm.json"
          test -f "$CI_REALM_FILE" || { echo "::error::ci-realm.json missing at $CI_REALM_FILE"; exit 1; }
          docker compose -p auth \
            -f infrastructure-as-code/docker/stacks/auth.compose.yaml \
            -f infrastructure-as-code/docker/keycloak/compose.ci.yaml up -d --wait
          # Neither mc-service nor mcm-bff has a build: in its compose (both are `image: …:latest`), so
          # build them locally BEFORE the up. Build the BFF too here: on this runner the `app` profile
          # pulls in the bff-nonsecure service, so mcm-bff:latest must already exist or --wait hangs.
          pnpm nx build mc-service
          pnpm nx docker-build mcm-app
          # Bring up app infra + mc-service + the dev BFF (:8082) together, images now present.
          docker compose -p mcm -f infrastructure-as-code/docker/stacks/mcm.compose.yaml \
            --profile app --profile bff-nonsecure up -d --wait

      - name: Bring up containerized agent gateway + MCP (production nodes)
        # agent-stack.mjs fetches the agent-gateway client secret via the mcm-bff-service service
        # account (client_credentials) — kc_admin reads KEYCLOAK_SERVICE_CLIENT_SECRET from env.
        env:
          KEYCLOAK_SERVICE_CLIENT_SECRET: ${{ secrets.KEYCLOAK_SERVICE_CLIENT_SECRET }}
        run: MODEL_PROVIDER="$MODEL_PROVIDER" pnpm nx up-agents-prod infrastructure-as-code

      # ── Agent LIVE integration suite (the layer no workflow ran until now) ───────────────────────
      # Until this step, NO project's `test:integration` executed anywhere in CI — only the `-m golden`
      # subset (keyless replay, guardrails). So tests/integration/ (organizer → movie-mcp → mc-service
      # with real Keycloak token-exchange) never ran, and silently rotted: `test_reimport_real_sample`
      # asserted against its own fixture's intentional bad rows for a month before anyone noticed.
      # This job already stands up EVERYTHING the suite needs (Keycloak + realm, mc-service, the 3 MCP
      # servers, gateway), so running it here is a few minutes on an already-warm stack.
      #
      # Placed BEFORE the web E2E / APK / emulator legs deliberately: a failure here costs ~2 min
      # instead of burning 15+ min of emulator time first.
      #
      # MCM_REQUIRE_LIVE_STACK=1 is load-bearing: the suite skips-clean when the stack/creds are absent
      # (right for a credential-less checkout, useless as a gate), so the conftest hook escalates any
      # non-allowlisted skip to a FAILURE here — otherwise a misconfigured run would skip everything and
      # still report green. `-m "not golden"` deselects the golden pairs: guardrails already runs them
      # keyless in replay, and here (with a real ANTHROPIC_API_KEY) they would make live Claude calls.
      # The MCP URLs need no plumbing — up-agents-prod publishes 127.0.0.1:8765/8766/8767, which are
      # exactly the tests' defaults.
      # E2E_ROPC_CLIENT_SECRET is NOT set here: the bring-up step minted it, pinned it into the realm
      # import, and re-exported it via $GITHUB_ENV — so it is already in this step's environment with
      # the value the realm actually holds. E2E_TEST_USER / E2E_TEST_PASSWORD / ANTHROPIC_API_KEY /
      # TMDB_API_KEY come from the job-level env.
      - name: Agent integration tests (live stack; skips escalate to failures)
        env:
          MCM_REQUIRE_LIVE_STACK: '1'
          KEYCLOAK_URL: http://localhost:8099
          MC_SERVICE_URL: http://localhost:3001
          KEYCLOAK_SERVICE_CLIENT_SECRET: ${{ secrets.KEYCLOAK_SERVICE_CLIENT_SECRET }}
          E2E_ROPC_CLIENT_ID: mcm-bff-test
        # `not golden`: guardrails covers golden keyless; a real ANTHROPIC_API_KEY here would make live
        # Claude calls. `not ci_quarantine`: 9 pre-existing failures on the CI/Claude env (TMDB, live-LLM
        # tool-choice, one add-persist) are quarantined + tracked (project_mcm_agent_integration_ci) so
        # this gate blocks on the ~43 that pass rather than sitting red forever. Un-quarantine per fix.
        run: pnpm nx test:integration movie-assistant -- -m "not golden and not ci_quarantine"

      # ── mc-service integration suite (feature 041 US2) ───────────────────────────────────────────
      # Until this feature NO project's test:integration except the agent suite ran anywhere in CI.
      # mc-service's Rust service-to-DB integration tests run here against the SAME replica-set Mongo
      # the stack already brought up (published 27017; the rs member is initiated as localhost:27017,
      # so directConnection=true lets a host-run test connect) + the live Keycloak (health_test builds
      # the app, which fetches JWKS on startup). Same fast-fail placement as the agent step — a failure
      # costs ~2 min, not the full emulator run.
      #
      # The Nx target runs scripts/mc-service-integration-guard.mjs (the cargo arm of the shared
      # skip-escalation convention): it runs the Cargo [[test]] binaries and FAILS a zero-executed /
      # all-ignored run, so a misconfigured run can't skip-to-green. A down Mongo/Keycloak already
      # FAILS via the tests' own .unwrap()/.expect() (Rust has no skip). The ~24 documented-#[ignore]
      # full-stack HTTP tests stay ignored (they need in-process JWKS timing that's flaky under
      # build_test_app; verified via the web/mobile E2E legs) — running them is a tracked follow-up.
      # Run cargo IN A CONTAINER, not on the host: the `ci` host user has no sudo, so the host GNU
      # openssl-sys build can't get pkg-config/libssl-dev. `rust:1-bookworm` (buildpack-deps base)
      # already ships those + a C toolchain, and — like the Web E2E Playwright step below — runs with
      # `--network host` so it reaches the published `localhost:27017` (rs member, directConnection) +
      # `:8099` on the rootless daemon's loopback. It only needs Node added (to run the guard). Cargo
      # writes to a container-internal target dir so no root-owned files land in the host checkout.
      - name: mc-service integration tests (rust container → live replica-set Mongo + Keycloak)
        run: |
          docker run --rm --network host \
            -v "$PWD":/work -w /work \
            -e MC_DB_URL='mongodb://localhost:27017/mc_db?replicaSet=rs0&directConnection=true' \
            -e KEYCLOAK_URL='http://localhost:8099' \
            -e KEYCLOAK_REALM=grumpyrobot \
            -e KEYCLOAK_CLIENT_ID=movie-collection-manager \
            -e MC_SERVICE_PORT=3001 \
            -e MCM_REQUIRE_LIVE_STACK=1 \
            -e CARGO_TARGET_DIR=/tmp/mc-int-target \
            rust:1-bookworm \
            bash -c "set -e; apt-get update -qq && apt-get install -y -qq --no-install-recommends nodejs >/dev/null; node --version; node scripts/mc-service-integration-guard.mjs"

      # ── BFF integration suite (feature 041 US3) ──────────────────────────────────────────────────
      # mcm-app's BFF integration tests drive the live containerized dev BFF (:8082) over HTTP against
      # real Keycloak + Redis (db 1) + BFF Mongo (:27018) — the auth/session/rate-limit/agent-config
      # server modules the E2E legs exercise only indirectly. The jest globalSetup preflight (the jest
      # arm of the skip-escalation convention) throws if any required dep is down, so a misconfigured
      # run fails loudly instead of skipping-to-green. The suite is serialized (maxWorkers:1) and
      # self-cleans by test-prefixed userId in afterAll (SC-005). tests/integration/setup/env.ts loads
      # gen-ci-env's .env.docker for the BFF client secrets; this step overrides the host-reachable
      # URLs (the .env.docker values are Docker-internal). E2E_ROPC_CLIENT_SECRET is already in
      # $GITHUB_ENV (minted at bring-up, pinned into the realm import); E2E_TEST_USER/PASSWORD come
      # from the job env.
      - name: BFF integration tests (live BFF + Keycloak + Redis + Mongo)
        env:
          MCM_REQUIRE_LIVE_STACK: '1'
          BFF_BASE_URL: http://localhost:8082
          KEYCLOAK_URL: http://localhost:8099
          KEYCLOAK_REALM: grumpyrobot
          KEYCLOAK_CLIENT_ID: movie-collection-manager
          MC_SERVICE_URL: http://localhost:3001
          E2E_ROPC_CLIENT_ID: mcm-bff-test
          KEYCLOAK_SERVICE_CLIENT_SECRET: ${{ secrets.KEYCLOAK_SERVICE_CLIENT_SECRET }}
          REDIS_TEST_URL: redis://localhost:6379/1
          MONGO_URL: mongodb://localhost:27018
        run: pnpm nx test:integration mcm-app

      # ── Web Playwright E2E against the dev-container BFF (FR-008, SC-003) ────────────────────────
      # Its global-setup logs in once and seeds BROWSE/MUTATION/DEFAULT + FIXTURE_MOVIES for the same
      # E2E_TEST_USER the mobile flows use — so this single run is both the web regression AND the seed.
      # The host is Ubuntu 26.04, which Playwright 1.60 refuses to install/run a chromium build for
      # (its OS allow-list, no override). Run the web E2E inside the official Playwright container
      # (browser + deps preinstalled, supported OS) with --network host so it reaches the dev BFF
      # (:8082) and Keycloak (:8099) on the host loopback — the same dev-container E2E path. The host
      # workspace (incl. node_modules from the earlier pnpm install) is mounted in.
      - name: Web E2E (Playwright container; host network → dev BFF)
        run: |
          docker run --rm --network host \
            -v "$PWD":/work -w /work/frontend/mcm-app \
            -e E2E_BFF_TARGET=dev-container \
            -e E2E_TEST_USER -e E2E_TEST_PASSWORD -e CI=1 \
            -e E2E_AGENT_PROVIDER=anthropic -e ANTHROPIC_API_KEY -e TMDB_API_KEY \
            mcr.microsoft.com/playwright:v1.60.0-noble \
            sh -c "corepack enable && pnpm exec playwright test"

      # ── Build the standalone (Metro-less) release APK ───────────────────────────────────────────
      - name: Build embedded-bundle E2E APK (release variant = embedded JS)
        working-directory: frontend/mcm-app
        env:
          APK_VARIANT: release   # release embeds the JS bundle -> standalone, no Metro
          APK_ABI: x86_64        # emulator ABI only -> faster build
          # Disable the Gradle daemon: on a persistent runner a reused daemon keeps the EXPO_PUBLIC_*
          # env it STARTED with and spawns the Metro bundler with that stale env, baking an old URL
          # (e.g. 10.0.2.2 instead of localhost) into the JS bundle. No daemon → current env each run.
          GRADLE_OPTS: -Dorg.gradle.daemon=false
        run: |
          echo "Baking EXPO_PUBLIC_BFF_NATIVE_URL=$EXPO_PUBLIC_BFF_NATIVE_URL EXPO_PUBLIC_KEYCLOAK_NATIVE_URL=$EXPO_PUBLIC_KEYCLOAK_NATIVE_URL"
          pnpm nx run mcm-app:build-apk
          # Absolute path: this step runs in frontend/mcm-app, but the emulator-runner's script runs
          # from the repo root, so a relative APK path wouldn't resolve there.
          apk="$(pwd)/$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)"
          test -f "$apk" || { echo "::error::release APK not found under frontend/mcm-app/android/app/build/outputs/apk/release"; exit 1; }
          # Guard: the bundle must INLINE EXPO_PUBLIC_BFF_NATIVE_URL (localhost:8082) — that string is
          # NOT a source literal anywhere, so its presence proves the env was re-inlined this build. A
          # stale Metro transform cache on the persistent runner silently kept baking the 10.0.2.2:8081
          # fallback (mobile login then hit a dead port → never reached the BFF). Fail HERE, fast, not
          # after the ~10-min emulator step. build-apk.mjs now wipes that cache for release builds.
          # grep -ac (count, reads whole stream) avoids a SIGPIPE-141 from `-q` early-exit under pipefail.
          hits="$(unzip -p "$apk" assets/index.android.bundle | grep -ac 'localhost:8082' || true)"
          [ "${hits:-0}" -ge 1 ] \
            || { echo "::error::release APK did not bake EXPO_PUBLIC_BFF_NATIVE_URL=localhost:8082 (stale Metro cache or env not inlined)"; exit 1; }
          echo "APK bundle baked localhost:8082 ($hits hit(s)) — EXPO_PUBLIC_* inlined OK"
          echo "APK_PATH=$apk" >> "$GITHUB_ENV"

      # ── Emulator + Maestro agent flows (FR-009) ─────────────────────────────────────────────────
      - name: Install Maestro
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # NOTE: do NOT clear the web-seeded agent config here. The mobile `assistant-config-gating`
      # flow (like enable-anthropic/disable) expects the test user to START with the runnable config
      # the web E2E seeded (T050) — it reaches the not-runnable state by toggling OFF + saving, then
      # asserts the dock is gone. Clearing it left the user disabled-from-the-start, which broke that
      # flow. (BFF Mongo: bff_db.user_agent_config.)
      - name: Run agent E2E flows on emulator
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        with:
          api-level: 34
          arch: x86_64
          # google_apis_playstore ships Chrome — a Custom-Tabs (CustomTabsService) provider. The
          # default/AOSP image has only the WebView shell, which is NOT a CCT provider: expo-web-browser
          # then falls back to a plain WebView that DROPS Keycloak's 302 to the mcm-app:// custom scheme
          # (no Intent dispatched → native-auth-callback never mounts → login never completes; confirmed
          # via full logcat, run f68632e). Chrome's CCT hands the custom-scheme redirect to the OS, which
          # launches the app's deep-link handler — completing the real OAuth flow. (feature 023 root cause.)
          target: google_apis_playstore
          force-avd-creation: true
          # Give Chrome headroom: the OAuth Custom Tab renderer was crashing mid-load on the default
          # AVD RAM (logcat: CustomTabActivity "WIN DEATH ... app died") — a flaky login. More guest
          # RAM + cores stabilises the Chrome process that drives the SSO flow.
          ram-size: 4096M
          heap-size: 576M
          cores: 3
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -memory 4096
          disable-animations: true
          # The android-emulator-runner executes this `script:` LINE-BY-LINE in separate shells, so a
          # multi-line for loop breaks ("end of file unexpected"). Keep it to single-line commands and
          # put the per-file Maestro loop in scripts/ci-mobile-agent-flows.sh (gating → enable-anthropic
          # → 4 agent flows → disable; anthropic provider, no local Ollama). cwd is the repo root.
          script: |
            adb reverse tcp:8082 tcp:8082
            adb reverse tcp:8099 tcp:8099
            adb install -r "$APK_PATH"
            bash scripts/ci-mobile-agent-flows.sh

      # ── Diagnostics on failure (FR-010) ─────────────────────────────────────────────────────────
      - name: Upload Maestro artifacts (screenshots + hierarchy) on failure
        if: failure()
        uses: actions/upload-artifact@ff15f0306b3f739f7b6fd43fb5d26cd321bd4de5 # v3
        with:
          name: maestro-debug
          path: ~/.maestro/tests/**
          if-no-files-found: ignore

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ff15f0306b3f739f7b6fd43fb5d26cd321bd4de5 # v3
        with:
          name: playwright-report
          path: frontend/mcm-app/playwright-report/**
          if-no-files-found: ignore

      # Full, timestamped per-service logs written to FILES and uploaded as an artifact — not just the
      # truncated `--tail=200` job-stdout dump, which the Forgejo API does not expose and which scrolls
      # away. An intermittent agent-flow failure (e.g. agent-disambiguation's empty dock panel on
      # 2026-07-09 run #539) is only diagnosable with the server side of the `/run` turn: the BFF +
      # gateway show whether `/run` returned 200 with a completed AG-UI stream while the client rendered
      # nothing (dropped-response signature), and movie-mcp + mc-service show whether the title-resolve
      # that feeds disambiguation timed out. `-t` timestamps let us line these up with the Maestro
      # 150 s assertion window. This `failure()` step runs BEFORE the `always()` teardown, so the
      # containers still exist here.
      - name: Collect container logs + health on failure
        if: failure()
        run: |
          mkdir -p container-logs
          # App AND data-tier containers. The data-tier set (mongo/postgres/redis) was previously MISSING,
          # so a bring-up failure like "mc-service-store-mongo is unhealthy" only landed in the compose
          # catch-all with no dedicated log or health dump — hard to diagnose out-of-band.
          for c in movie-assistant-gateway movie-assistant-mcp-movie movie-assistant-mcp-webapi \
                   movie-assistant-mcp-spreadsheet mcm-bff-service-nonsecure mc-service keycloak-service \
                   keycloak-store-postgres mc-service-store-mongo mc-service-store-mongo-rs-init \
                   mcm-bff-store-mongo mcm-bff-cache-redis movie-assistant-store-postgres; do
            docker logs -t "$c" > "container-logs/$c.log" 2>&1 || echo "container absent: $c" > "container-logs/$c.log"
            # The healthcheck's own output is THE reason a container reports "unhealthy" — capture it.
            docker inspect --format '{{json .State.Health}}' "$c" > "container-logs/$c.health.json" 2>/dev/null || true
          done
          # One-glance status/health table for EVERY container (which is unhealthy/exited + why).
          docker ps -a --format 'table {{.Names}}\t{{.Status}}' > container-logs/_ps.txt 2>&1 || true
          # Compose-level captures too (any service not named above, plus restart churn).
          docker compose -p mcm -f infrastructure-as-code/docker/stacks/mcm.compose.yaml --profile app --profile bff-nonsecure logs -t --no-color > container-logs/_mcm-stack.log 2>&1 || true
          docker compose -p auth -f infrastructure-as-code/docker/stacks/auth.compose.yaml logs -t --no-color > container-logs/_auth-stack.log 2>&1 || true
          # Persist to a STABLE host path that survives workspace reuse AND the always() `compose down -v`,
          # so a failure is inspectable out-of-band (ssh ci@runner: ~/mcm-ci-last-failure) even after
          # teardown. Only the latest failure is kept. This is the durable debug trail (the Forgejo API
          # exposes no step logs/artifacts).
          rm -rf "$HOME/mcm-ci-last-failure" && cp -r container-logs "$HOME/mcm-ci-last-failure" 2>/dev/null || true
          # Quick-glance to the job log (visible inline, no artifact download needed).
          echo "::group::container status + health"; cat container-logs/_ps.txt 2>/dev/null || true; \
            for h in container-logs/*.health.json; do [ -s "$h" ] && { echo "-- $h --"; cat "$h"; echo; }; done; echo "::endgroup::"
          echo "::group::mc-service-store-mongo (tail 200)"; tail -n 200 container-logs/mc-service-store-mongo.log 2>/dev/null || true; echo "::endgroup::"
          echo "::group::gateway (tail 200)"; tail -n 200 container-logs/movie-assistant-gateway.log 2>/dev/null || true; echo "::endgroup::"
          echo "::group::bff-nonsecure (tail 200)"; tail -n 200 container-logs/mcm-bff-service-nonsecure.log 2>/dev/null || true; echo "::endgroup::"

      - name: Upload container logs on failure
        if: failure()
        uses: actions/upload-artifact@ff15f0306b3f739f7b6fd43fb5d26cd321bd4de5 # v3
        with:
          name: agent-e2e-container-logs
          path: container-logs/**
          if-no-files-found: ignore

      # feature 029 (FR-011): a leftover CI app-e2e stack held prod's 8099 for 6h and blocked every
      # prod-auth redeploy (2026-07-06 outage — CI + prod share one host's port space). Tear down every
      # stack this job started — on success, FAILURE, AND cancel — so no CI stack can ever hold a host
      # port against a prod deploy. Mirrors the "Bring up …" invocations exactly. `|| true` per stack so
      # one teardown failure doesn't skip the others. (Prod ports now live in the 19000–19099 reserved
      # range, so this is defense-in-depth, not the sole guard — check-prod-ci-port-collision.mjs is.)
      - name: Tear down CI stacks (always)
        if: ${{ always() }}
        run: |
          docker compose -p auth \
            -f infrastructure-as-code/docker/stacks/auth.compose.yaml \
            -f infrastructure-as-code/docker/keycloak/compose.ci.yaml down -v --remove-orphans || true
          docker compose -p mcm -f infrastructure-as-code/docker/stacks/mcm.compose.yaml \
            --profile app --profile bff-nonsecure down -v --remove-orphans || true
          pnpm nx down-agents-prod infrastructure-as-code || true

  # ── DAST security scan (feature 031) ──────────────────────────────────────────────────────────
  # OWASP ZAP FULL (active BFF + mc-service, passive gateway) against the ephemeral throwaway stack.
  # Independent of app-e2e (own pass/fail + own artifact). Path-gated on changes.app (docs/Komodo-only
  # PRs skip — SC-007). Brings up auth + mcm(app+bff-nonsecure) + the agent stack (so the gateway target
  # exists — C1), runs the scan attached to backend-network (no new host ports — FR-016), scans the
  # reports for secret leakage BEFORE upload (SC-008), publishes the report artifact always, then gates
  # on any un-allowlisted High (FR-009). Contract: specs/031-dast-zap-scanning/contracts/ci-integration-contract.md.
  dast:
    needs: [changes]
    if: ${{ needs.changes.outputs.app == 'true' }}
    runs-on: kvm
    timeout-minutes: 45
    env:
      DOCKER_HOST: unix:///run/user/1001/docker.sock
      MODEL_PROVIDER: ${{ github.event.inputs.provider || vars.MODEL_PROVIDER || 'anthropic' }}
      # up-agents-prod (agent-stack.mjs) refuses to start the gateway with MODEL_PROVIDER=anthropic and
      # no key. The gateway is scanned PASSIVE-only (spider won't POST /run), so no real inference is
      # triggered — the key only lets the server boot. Mirrors app-e2e. Guarded in the leak check + scrub.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      E2E_TEST_USER: ${{ secrets.E2E_TEST_USER }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      # ROPC client used by bearer-auth.js (mcm-bff-test). The secret is minted per-run below and pinned
      # into the realm import; it is re-exported to the scan step via $GITHUB_ENV so both agree.
      E2E_ROPC_CLIENT_ID: mcm-bff-test
      # DAST_ALLOW_ACTIVE unlocks --mode full ONLY in this disposable-stack job (D8 guard, FR-017).
      DAST_ALLOW_ACTIVE: '1'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker CLI (job talks to the runner's daemon socket)
        run: |
          if ! command -v docker >/dev/null 2>&1; then
            curl -fsSL https://download.docker.com/linux/static/stable/x86_64/docker-27.5.1.tgz \
              | tar xz -C /usr/local/bin --strip-components=1 docker/docker
          fi
          docker info >/dev/null 2>&1 || { echo "::error::Docker daemon not reachable"; exit 1; }

      - name: Free daemon disk space
        run: docker image prune -af || true

      - name: Install latest Docker Compose plugin
        run: |
          mkdir -p ~/.docker/cli-plugins
          curl -fsSL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 \
            -o ~/.docker/cli-plugins/docker-compose
          chmod +x ~/.docker/cli-plugins/docker-compose
          docker compose version

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20, cache: pnpm }
      # up-agents-prod (agent-stack.mjs) shells to `uv` to fetch the gateway client secret from Keycloak.
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          github-token: ${{ secrets.RENOVATE_GITHUB_COM_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Persistent runner: reset stateful data so the realm import picks up ci-realm.json each run.
      - name: Reset stateful CI data
        run: |
          docker rm -f keycloak-service keycloak-store-postgres keycloak-mailpit \
            mc-service mc-service-store-mongo mc-service-store-mongo-rs-init \
            mcm-bff-service-nonsecure mcm-bff-cache-redis mcm-bff-store-mongo \
            movie-assistant-gateway movie-assistant-mcp-movie movie-assistant-mcp-webapi \
            movie-assistant-mcp-spreadsheet movie-assistant-store-postgres 2>/dev/null || true
          docker volume rm keycloak-store-postgres-data mc-service-store-mongo-data \
            mcm-bff-store-mongo-data movie-assistant-store-postgres-data 2>/dev/null || true

      - name: First-time docker setup (networks + volumes)
        run: |
          for n in backend-network keycloak-network movie-assistant-mcp-network; do docker network create "$n" || true; done
          for v in mc-service-store-mongo-data keycloak-store-postgres-data mcm-bff-cache-redis-data \
                   mcm-bff-store-mongo-data movie-assistant-store-postgres-data; do docker volume create "$v" || true; done

      - name: Mint per-stack secrets (stacks/*.env)
        run: node scripts/gen-dev-secrets.mjs

      - name: Write CI env/secret files (.env.docker)
        env:
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
          KEYCLOAK_SERVICE_CLIENT_SECRET: ${{ secrets.KEYCLOAK_SERVICE_CLIENT_SECRET }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          AGENT_SUBJECT_TOKEN_CLIENT_SECRET: ${{ secrets.AGENT_SUBJECT_TOKEN_CLIENT_SECRET }}
          AGENT_CONFIG_ENC_KEY: ${{ secrets.AGENT_CONFIG_ENC_KEY }}
        run: node scripts/gen-ci-env.mjs

      - name: Bring up auth + mcm (app + dev BFF) stacks
        env:
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
          KEYCLOAK_SERVICE_CLIENT_SECRET: ${{ secrets.KEYCLOAK_SERVICE_CLIENT_SECRET }}
          AGENT_SUBJECT_TOKEN_CLIENT_SECRET: ${{ secrets.AGENT_SUBJECT_TOKEN_CLIENT_SECRET }}
        run: |
          export AGENT_GATEWAY_CLIENT_SECRET="$(node -e 'process.stdout.write(require("crypto").randomBytes(32).toString("hex"))')"
          export MC_SERVICE_CLIENT_SECRET="$(node -e 'process.stdout.write(require("crypto").randomBytes(32).toString("hex"))')"
          # The ROPC client secret must be identical at realm-import AND at scan time (bearer-auth.js).
          export E2E_ROPC_CLIENT_SECRET="$(node -e 'process.stdout.write(require("crypto").randomBytes(32).toString("hex"))')"
          echo "E2E_ROPC_CLIENT_SECRET=$E2E_ROPC_CLIENT_SECRET" >> "$GITHUB_ENV"
          export CI_REALM_FILE="$PWD/infrastructure-as-code/docker/keycloak/ci-realm.json"
          test -f "$CI_REALM_FILE" || { echo "::error::ci-realm.json missing"; exit 1; }
          docker compose -p auth \
            -f infrastructure-as-code/docker/stacks/auth.compose.yaml \
            -f infrastructure-as-code/docker/keycloak/compose.ci.yaml up -d --wait
          pnpm nx build mc-service
          pnpm nx docker-build mcm-app
          docker compose -p mcm -f infrastructure-as-code/docker/stacks/mcm.compose.yaml \
            --profile app --profile bff-nonsecure up -d --wait

      - name: Bring up containerized agent gateway + MCP (gateway scan target — C1)
        env:
          KEYCLOAK_SERVICE_CLIENT_SECRET: ${{ secrets.KEYCLOAK_SERVICE_CLIENT_SECRET }}
        run: MODEL_PROVIDER="$MODEL_PROVIDER" pnpm nx up-agents-prod infrastructure-as-code

      # ── Run the FULL (active) scan (D8-guarded by DAST_ALLOW_ACTIVE + --target ci) ────────────────
      - name: DAST full scan (ZAP on backend-network)
        run: node scripts/zap-scan.mjs --target ci --mode full

      # ── Secret-leak check BEFORE upload (SC-008 / C4): fail if the test password or a token leaks ──
      - name: Scan reports for secret leakage
        run: |
          leak=0
          if [ -n "$E2E_TEST_PASSWORD" ] && grep -rqF "$E2E_TEST_PASSWORD" security/zap/reports/ 2>/dev/null; then
            echo "::error::DAST report contains the test password — refusing to publish"; leak=1
          fi
          if [ -n "$E2E_ROPC_CLIENT_SECRET" ] && grep -rqF "$E2E_ROPC_CLIENT_SECRET" security/zap/reports/ 2>/dev/null; then
            echo "::error::DAST report contains the ROPC client secret — refusing to publish"; leak=1
          fi
          if [ -n "$ANTHROPIC_API_KEY" ] && grep -rqF "$ANTHROPIC_API_KEY" security/zap/reports/ 2>/dev/null; then
            echo "::error::DAST report contains the Anthropic API key — refusing to publish"; leak=1
          fi
          # Bearer tokens are long JWTs (eyJ… .… .…). Any occurrence in a report is a leak.
          if grep -rqE 'eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}' security/zap/reports/ 2>/dev/null; then
            echo "::error::DAST report contains a JWT — refusing to publish"; leak=1
          fi
          exit $leak

      - name: Upload DAST report (always)
        if: ${{ always() }}
        uses: actions/upload-artifact@ff15f0306b3f739f7b6fd43fb5d26cd321bd4de5 # v3
        with:
          name: dast-report
          path: security/zap/reports/**
          if-no-files-found: ignore

      - name: Gate on un-allowlisted High findings
        run: node scripts/check-dast-findings.mjs --report security/zap/reports/report.json --allowlist security/zap/allowlist.yaml

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose -p auth -f infrastructure-as-code/docker/stacks/auth.compose.yaml \
            -f infrastructure-as-code/docker/keycloak/compose.ci.yaml logs --tail=150 || true
          docker compose -p mcm -f infrastructure-as-code/docker/stacks/mcm.compose.yaml \
            --profile app --profile bff-nonsecure logs --tail=150 || true
          docker logs movie-assistant-gateway --tail=100 || true

      - name: Tear down CI stacks (always)
        if: ${{ always() }}
        run: |
          docker compose -p auth \
            -f infrastructure-as-code/docker/stacks/auth.compose.yaml \
            -f infrastructure-as-code/docker/keycloak/compose.ci.yaml down -v --remove-orphans || true
          docker compose -p mcm -f infrastructure-as-code/docker/stacks/mcm.compose.yaml \
            --profile app --profile bff-nonsecure down -v --remove-orphans || true
          pnpm nx down-agents-prod infrastructure-as-code || true

  # ── Trigger CD once CI is green on main (CD hardening Option 2, 2026-07-03) ────────────────────
  # Replaces cd-deploy's old POLLING ci-gate (which raced an 80-min wall clock against app-e2e queued on
  # the single kvm runner → false timeout). Ordering is now a dependency EDGE: this job `needs:` the CI
  # jobs, so it only runs AFTER they succeed — then it dispatches cd-deploy (deploy=true). cd-deploy has
  # no push trigger, so this is the ONLY automatic deploy path. Runs only on a push to main (a merge);
  # skipped on PRs/other branches (so opening/merging a PR doesn't deploy from the PR head).
  trigger-cd:
    needs: [affected, mc-service-checks, app-e2e, dast]
    # `always()` so this still evaluates when app-e2e was SKIPPED (path-gated for a config-only change);
    # then gate explicitly: deploy on green main only when affected + mc-service-checks succeeded and
    # app-e2e did not FAIL (success OR skipped). A skipped needs-dependency would otherwise cascade-skip
    # this job, which would leave a legit config change undeployed.
    if: >-
      ${{ always()
          && github.event_name == 'push' && github.ref == 'refs/heads/main'
          && needs.affected.result == 'success'
          && needs.mc-service-checks.result == 'success'
          && (needs.app-e2e.result == 'success' || needs.app-e2e.result == 'skipped')
          && (needs.dast.result == 'success' || needs.dast.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      # Defense-in-depth: app-ci is green by construction (this job `needs:` its jobs), but cd-deploy is
      # meant to gate on guardrails too. guardrails is a separate, fast workflow that has long since
      # reported by the time app-e2e (a `needs` of this job) finishes — so a SINGLE status read confirms
      # it (no polling loop, no wall clock). node-parsed (not grep) so it's robust to JSON shape.
      - name: Confirm guardrails is green on this commit
        env:
          GH_TOKEN: ${{ secrets.CD_PUSH_TOKEN }}
          GH_API_URL: ${{ github.api_url }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          api="${GH_API_URL}/repos/${GH_REPO}/commits/${GH_SHA}/statuses?limit=100"
          curl -fsSL -H "Authorization: token ${GH_TOKEN}" "$api" > statuses.json
          node -e '
            const a = JSON.parse(require("fs").readFileSync("statuses.json","utf8"));
            const latest = {};                       // statuses come newest-first → first seen per context wins
            for (const s of a) if (!(s.context in latest)) latest[s.context] = s.status;
            const g = Object.entries(latest).filter(([c]) => c.startsWith("guardrails"));
            if (!g.length) { console.error("::error::no guardrails status reported on this commit"); process.exit(1); }
            const bad = g.filter(([, st]) => st !== "success");
            if (bad.length) { console.error("::error::guardrails not green: " + JSON.stringify(bad)); process.exit(1); }
            console.log("guardrails green: " + g.map(([c]) => c).join(", "));
          '
      - name: Dispatch cd-deploy (deploy=true) — CI is green on main
        env:
          GH_TOKEN: ${{ secrets.CD_PUSH_TOKEN }}
          GH_API_URL: ${{ github.api_url }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          curl -fsSL -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H 'Content-Type: application/json' \
            "${GH_API_URL}/repos/${GH_REPO}/actions/workflows/cd-deploy.yml/dispatches" \
            -d '{"ref":"main","inputs":{"deploy":"true"}}'
          echo "dispatched cd-deploy (deploy=true) on main @ ${GH_SHA}"
