# Feature 023 (US3) — Continuous Deployment. main-only: build 6 images via their Nx targets →
# Trivy scan (critical ⇒ block) → push by tag+digest → DIGEST-BY-GIT promotion (write the immutable
# …@sha256: digest into the tracked .env.deploy, commit+push) → fire the SIGNED Komodo webhook (git-
# style redeploy) → post-deploy health probe → rollback (git-revert the promotion + re-fire) on
# failure. Promote by digest, never rebuild for prod (FR-012..FR-017). Also builds the prod APK with
# the public BFF host baked (T018a).
#
# Why digest-by-git (NOT a posted digest body): Komodo's webhook is a git-style redeploy — it
# validates the branch in a GitHub-shaped payload + `X-Hub-Signature-256` (HMAC with the global
# KOMODO_WEBHOOK_SECRET, == the CI secret KOMODO_WEBHOOK_AUTH) and re-clones the branch. It will NOT
# consume a posted image digest, and Stack env vars set in the Komodo UI aren't reliably injected on
# webhook deploys (#1209). So CI carries the digest in git via .env.deploy and Komodo's compose
# interpolates ${MCM_BFF_IMAGE} from it. There is no rollback endpoint → rollback = redeploy the
# prior digest (git-revert the promotion commit, re-fire). See Server-Setup-Runbook §9/§15 +
# specs/023-forgejo-cicd/contracts/{komodo-deploy-and-rollback,image-and-digest-promotion}.md.
#
# Gating (FR-020, FR-025): on push to `main`, the `ci-gate` job fails closed unless the commit's
# guardrails + app-ci checks are green. Branch protection on `main` (T021) requires those checks, so a
# working-branch push never reaches here. No approval gate (clarify 2026-06-23).
#
# workflow_dispatch (deploy=false, default): build + Trivy + push + promote-to-git ONLY — no webhook,
# no probe. This mints the mcm-bff registry image before the 022→main merge so the operator can stand
# up the prod-app Komodo Stack and validate, resolving the merge/probe chicken-and-egg. deploy=true
# (or any push to main) runs the full deploy + probe + rollback.
#
# No committed infra-topology literal: registry host/namespace, the Komodo webhook, and the public
# BASE_DOMAIN are Forgejo Actions vars/secrets, never hardcoded (contracts/secrets-and-variables.md).
name: cd-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Fire the Komodo webhook + health probe (true), or build+publish+promote only (false)'
        type: boolean
        default: false

concurrency:
  group: cd-deploy-main
  cancel-in-progress: false   # never cancel an in-flight production deploy

env:
  REGISTRY: ${{ vars.REGISTRY }}
  NS: ${{ vars.NS }}
  REGISTRY_USER: ${{ vars.REGISTRY_USER }}
  NX_SELF_HOSTED_REMOTE_CACHE_SERVER: ${{ vars.NX_SELF_HOSTED_REMOTE_CACHE_SERVER }}
  NX_SELF_HOSTED_REMOTE_CACHE_ACCESS_TOKEN: ${{ secrets.NX_SELF_HOSTED_REMOTE_CACHE_ACCESS_TOKEN }}
  # Path of the tracked digest-by-git promotion file (un-ignored in .gitignore; see header).
  ENV_DEPLOY_PATH: infrastructure-as-code/docker/bff/.env.deploy

jobs:
  # ── Fail-closed CI gate (FR-020, FR-025) ──────────────────────────────────────────────────────
  # Polls the commit's check statuses and proceeds only when guardrails + app-ci are BOTH success.
  # While they are still running it waits; any failure (or timeout) aborts → no publish, no deploy.
  # Skipped on workflow_dispatch — an operator triggering by hand vouches for the state. (A skipped
  # `needs` dependency still lets dependents run.) Branch protection on `main` (T021) is the
  # authoritative fail-closed gate; this is defense-in-depth for the automatic push path.
  ci-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      # Step-level (not job-level) skip on dispatch: a job whose only step skips still reports
      # SUCCESS, so the `needs: ci-gate` build/apk jobs run — a job-level `if` would mark ci-gate
      # `skipped` and cascade-skip every downstream job (Actions/Forgejo skip-propagation).
      - name: Wait for guardrails + app-ci to be green on this commit
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUIRED: 'guardrails app-ci'
        run: |
          set -euo pipefail
          api="${{ github.api_url }}/repos/${{ github.repository }}/commits/${{ github.sha }}/statuses"
          deadline=$(( $(date +%s) + 80*60 ))
          while :; do
            body=$(curl -fsSL -H "Authorization: token ${GH_TOKEN}" "$api" || echo '[]')
            ok=true
            for ctx in $REQUIRED; do
              # latest status for this context
              state=$(echo "$body" | grep -o "\"context\":\"[^\"]*${ctx}[^\"]*\",\"[^}]*\"status\":\"[a-z]*\"" | head -1 | grep -o '"status":"[a-z]*"' | cut -d'"' -f4 || true)
              case "$state" in
                success) ;;
                failure|error) echo "::error::required check '$ctx' = $state"; exit 1 ;;
                *) ok=false ;;   # pending / not yet reported
              esac
            done
            $ok && { echo "guardrails + app-ci green"; break; }
            [ "$(date +%s)" -lt "$deadline" ] || { echo "::error::timed out waiting for CI green (fail-closed)"; exit 1; }
            sleep 30
          done

  # ── Build → Trivy scan → push (tag + digest) → emit promotion artifacts (FR-012..FR-014) ───────
  build-scan-publish:
    needs: ci-gate
    # HOST/kvm runner (same as app-ci's app-e2e): every `nx build` here is a Docker IMAGE build and we
    # docker login/push to the registry — none of which work from the default `ubuntu-latest`
    # node:22-bookworm job container (no Docker CLI, no daemon). The kvm runner reaches the ci rootless
    # daemon via DOCKER_HOST and provides the Docker CLI (installed below if missing).
    runs-on: kvm
    timeout-minutes: 90
    env:
      # Reach the ci user's rootless Docker daemon (adjust 1001 if `id -u ci` differs).
      DOCKER_HOST: unix:///run/user/1001/docker.sock
    outputs:
      manifest: ${{ steps.publish.outputs.manifest }}
    steps:
      - uses: actions/checkout@v4

      # Mirror app-e2e: install the Docker CLI if the job image lacks it, then confirm the daemon is
      # reachable over the mounted socket. Fail LOUD if not — the build can't proceed without Docker.
      - name: Set up Docker CLI (talk to the runner's daemon socket)
        run: |
          if ! command -v docker >/dev/null 2>&1; then
            curl -fsSL https://download.docker.com/linux/static/stable/x86_64/docker-27.5.1.tgz \
              | tar xz -C /usr/local/bin --strip-components=1 docker/docker
          fi
          docker version --format 'client {{.Client.Version}}' || true
          if docker info >/dev/null 2>&1; then
            echo "docker daemon reachable"
          else
            echo "::error::Docker CLI present but daemon unreachable — mount /run/user/1001/docker.sock into the kvm job (runner config.yaml container.options), then restart the runner."
            exit 1
          fi
      - name: Free daemon disk space
        run: docker image prune -af || true

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Trivy
        run: |
          curl -fsSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      # Build all 6 images THROUGH their Nx targets (constitution — never a parallel raw docker build).
      - name: Build images (Nx targets)
        run: |
          pnpm nx run-many --target=build --projects=mc-service,movie-assistant,movie-mcp,web-api-mcp,spreadsheet-mcp
          pnpm nx docker-build mcm-app

      # Retag → scan (critical blocks) → login → push → capture digest into the run manifest AND the
      # digest-by-git promotion file (.env.deploy body). repo→VAR: uppercase, '-'→'_', suffix _IMAGE
      # (mcm-bff → MCM_BFF_IMAGE). Only MCM_BFF_IMAGE is consumed by a prod stack today; the rest are
      # emitted forward-compatibly for the mc-service/agent stacks when they land.
      - name: Scan, push (by tag + digest), build manifest + promotion file
        id: publish
        env:
          # Forgejo reserves the FORGEJO_/GITEA_/GITHUB_ secret-name prefixes, so this is REGISTRY_TOKEN.
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          : "${REGISTRY:?set REGISTRY var}" "${NS:?set NS var}" "${REGISTRY_USER:?set REGISTRY_USER var}"
          echo "$REGISTRY_TOKEN" | docker login "$REGISTRY" -u "$REGISTRY_USER" --password-stdin
          # local-tag : registry-repo  (per contracts/image-and-digest-promotion.md)
          map="mc-service:latest=mc-service mcm-bff:latest=mcm-bff agent-gateway:latest=agent-gateway \
               movie-mcp:latest=movie-mcp web-api-mcp:latest=web-api-mcp spreadsheet-mcp:latest=spreadsheet-mcp"
          entries=""
          : > env-deploy.body
          for pair in $map; do
            local_tag="${pair%%=*}"; repo="${pair##*=}"
            ref="${REGISTRY}/${NS}/${repo}:${GITHUB_SHA}"
            docker tag "$local_tag" "$ref"
            echo "── Trivy scan $repo (block on CRITICAL) ──"
            trivy image --exit-code 1 --severity CRITICAL --no-progress "$local_tag"
            docker push "$ref"
            digest=$(docker inspect --format='{{index .RepoDigests 0}}' "$ref" | cut -d'@' -f2)
            pinned="${REGISTRY}/${NS}/${repo}@${digest}"
            echo "$repo -> $pinned"
            # Assemble the run manifest in pure shell (no jq/python dependency on the runner).
            entry="\"$repo\":{\"tag\":\"$ref\",\"digest\":\"$pinned\"}"
            entries="${entries:+$entries,}$entry"
            # Promotion file body: VAR=<immutable digest ref>
            varname="$(echo "$repo" | tr 'a-z-' 'A-Z_')_IMAGE"
            echo "${varname}=${pinned}" >> env-deploy.body
          done
          manifest="{$entries}"
          echo "$manifest" > deploy-manifest.json
          echo "manifest=$manifest" >> "$GITHUB_OUTPUT"
          # Final .env.deploy content (header + the VAR=digest lines). The deploy job drops this in.
          {
            echo "# GENERATED by cd-deploy (${GITHUB_SHA}) — digest-by-git promotion. DO NOT EDIT BY HAND."
            echo "# Each VAR pins the immutable registry digest CI built+scanned+pushed this run."
            echo "# Operator (T013): point the prod-app Komodo Stack's env-file at this file so compose"
            echo "# interpolates \${MCM_BFF_IMAGE} from it; keep the gitignored .env.prod for secrets."
            cat env-deploy.body
          } > env-deploy.generated
          echo "── generated $ENV_DEPLOY_PATH ──"; cat env-deploy.generated

      - name: Upload deploy manifest + promotion file
        uses: actions/upload-artifact@v4
        with:
          name: deploy-manifest
          path: |
            deploy-manifest.json
            env-deploy.generated
          if-no-files-found: error

  # ── Prod APK with the PUBLIC BFF host baked (T018a, FR-026) ───────────────────────────────────
  # Ports .github/workflows/android-apk.yml. The release APK's BFF/Keycloak URLs are the public hosts
  # from Forgejo vars — NOT the CI emulator 10.0.2.2:8082 (T010) and not a committed literal/IP.
  prod-apk:
    needs: ci-gate
    # The prod APK is a deliverable of the real deploy path only; skip it on a build-only mint dispatch
    # (deploy=false) so the run is fast. No job `needs` prod-apk, so skipping it cascades to nothing.
    if: ${{ github.event_name == 'push' || inputs.deploy == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      EXPO_PUBLIC_BFF_NATIVE_URL: https://mcm.${{ vars.BASE_DOMAIN }}
      EXPO_PUBLIC_KEYCLOAK_NATIVE_URL: https://auth.${{ vars.BASE_DOMAIN }}
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/share/swift /usr/local/share/powershell /usr/local/lib/node_modules || true
          df -h /
      - uses: pnpm/action-setup@v4
        with: { version: 10.33.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 24.14.1, cache: pnpm }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build release APK (public BFF host baked)
        env:
          APK_VARIANT: release
        run: |
          : "${EXPO_PUBLIC_BFF_NATIVE_URL:?set BASE_DOMAIN var}"
          echo "Baking BFF URL: $EXPO_PUBLIC_BFF_NATIVE_URL"
          pnpm nx run mcm-app:build-apk
      - name: Upload prod APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcm-release-apk-${{ github.sha }}
          path: frontend/mcm-app/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  # ── Digest-by-git promotion → signed Komodo redeploy → health probe → rollback ────────────────
  #     (FR-015, FR-016, FR-017; komodo-deploy-and-rollback.md)
  deploy:
    needs: build-scan-publish
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Whether to actually drive Komodo this run (always on push to main; opt-in on manual dispatch).
    env:
      DO_DEPLOY: ${{ github.event_name == 'push' || inputs.deploy == true }}
    steps:
      # Full clone of the branch this run targets, with push credentials, so we can commit the digest
      # and (on failure) git-revert it. ref_name is `main` on push; the dispatched branch otherwise.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Download deploy manifest + promotion file
        uses: actions/download-artifact@v4
        with:
          name: deploy-manifest

      # Write the immutable digest(s) into the tracked .env.deploy and commit+push (`[skip ci]` so this
      # commit does NOT re-trigger cd-deploy). The promotion commit IS the deploy record; reverting it
      # is the rollback. Runs on every CD path (push + dispatch) so the operator always gets the digest
      # in git even on a build-only manual run.
      - name: Promote digest to git (.env.deploy)
        id: promote
        run: |
          set -euo pipefail
          cp env-deploy.generated "$ENV_DEPLOY_PATH"
          git config user.name  'cd-deploy[bot]'
          git config user.email 'cd-deploy@users.noreply.localhost'
          if git diff --quiet -- "$ENV_DEPLOY_PATH"; then
            echo "no digest change — nothing to promote"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add "$ENV_DEPLOY_PATH"
          git commit -m "chore(cd): promote ${GITHUB_SHA} image digest(s) [skip ci]"
          # Land on top of any concurrent change before pushing (concurrency serializes CD, but a human
          # could have pushed). The committed file is regenerated, so a rebase conflict is unlikely.
          git pull --rebase origin "${{ github.ref_name }}"
          git push origin "HEAD:${{ github.ref_name }}"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "promoted $(grep -v '^#' "$ENV_DEPLOY_PATH" | paste -sd' ' -)"

      # Fire the SIGNED Komodo webhook: a GitHub-shaped push payload + X-Hub-Signature-256 (HMAC-SHA256
      # of the exact body bytes with KOMODO_WEBHOOK_AUTH). Komodo validates the branch + signature, then
      # re-clones and redeploys, interpolating the just-committed digest. KOMODO_WEBHOOK_URL may list
      # several stack webhooks (whitespace-separated) — all signed identically for this branch.
      - name: Fire signed Komodo redeploy webhook(s)
        if: ${{ env.DO_DEPLOY == 'true' }}
        env:
          KOMODO_WEBHOOK_URL: ${{ vars.KOMODO_WEBHOOK_URL }}
          KOMODO_WEBHOOK_AUTH: ${{ secrets.KOMODO_WEBHOOK_AUTH }}
        run: |
          set -euo pipefail
          : "${KOMODO_WEBHOOK_URL:?set KOMODO_WEBHOOK_URL var}" "${KOMODO_WEBHOOK_AUTH:?set KOMODO_WEBHOOK_AUTH secret}"
          printf '{"ref":"%s"}' "${{ github.ref }}" > webhook-payload.json
          sig="sha256=$(openssl dgst -sha256 -hmac "$KOMODO_WEBHOOK_AUTH" webhook-payload.json | sed 's/^.*= *//')"
          for url in $KOMODO_WEBHOOK_URL; do
            echo "→ redeploy $url"
            curl -fsSL -X POST "$url" \
              -H 'content-type: application/json' \
              -H 'X-GitHub-Event: push' \
              -H "X-Hub-Signature-256: ${sig}" \
              --data-binary @webhook-payload.json
          done

      # Post-deploy health probe (komodo-deploy-and-rollback.md step 5). BASE_DOMAIN is a Forgejo
      # variable (public host/topology, kept out of git — same rule as REGISTRY/KOMODO_WEBHOOK_URL).
      - name: Post-deploy health probe (issuer + app health)
        id: probe
        if: ${{ env.DO_DEPLOY == 'true' }}
        env:
          BASE_DOMAIN: ${{ vars.BASE_DOMAIN }}
        run: |
          set -euo pipefail
          : "${BASE_DOMAIN:?set BASE_DOMAIN var}"
          # Komodo needs time to pull + recreate; poll briefly for convergence.
          for i in $(seq 1 30); do
            iss=$(curl -fsS "https://auth.${BASE_DOMAIN}/realms/grumpyrobot/.well-known/openid-configuration" \
                    | grep -o '"issuer":"[^"]*"' | cut -d'"' -f4 || true)
            app=$(curl -s -o /dev/null -w '%{http_code}' "https://mcm.${BASE_DOMAIN}" || echo 000)
            if [ "$iss" = "https://auth.${BASE_DOMAIN}" ] && [ "$app" = "200" ]; then
              echo "probe ok (issuer + app health)"; exit 0
            fi
            echo "probe attempt $i: issuer='$iss' app=$app — waiting"; sleep 10
          done
          echo "::error::post-deploy probe failed"; exit 1

      # Rollback = redeploy the PRIOR digest. git-revert the promotion commit (restores the previous
      # .env.deploy), push, and re-fire the signed webhook so Komodo redeploys the last-good digest.
      # There is no Komodo rollback endpoint (FR-016). If the promotion was the first-ever (prior digest
      # empty), the revert restores the fail-fast empty value — prod refuses the bogus image rather than
      # serving it, and this step fails the run for operator attention.
      - name: Rollback to prior digest on probe failure
        if: ${{ failure() && steps.probe.outcome == 'failure' && steps.promote.outputs.changed == 'true' }}
        env:
          KOMODO_WEBHOOK_URL: ${{ vars.KOMODO_WEBHOOK_URL }}
          KOMODO_WEBHOOK_AUTH: ${{ secrets.KOMODO_WEBHOOK_AUTH }}
        run: |
          set -euo pipefail
          echo "Probe failed — reverting promotion ${{ steps.promote.outputs.commit }} (redeploy prior digest)"
          git revert --no-edit "${{ steps.promote.outputs.commit }}"
          # `[skip ci]` so the revert commit doesn't re-trigger cd-deploy.
          git commit --amend -m "revert(cd): roll back failed deploy ${GITHUB_SHA} to prior digest [skip ci]"
          git pull --rebase origin "${{ github.ref_name }}"
          git push origin "HEAD:${{ github.ref_name }}"
          : "${KOMODO_WEBHOOK_URL:?}" "${KOMODO_WEBHOOK_AUTH:?}"
          printf '{"ref":"%s"}' "${{ github.ref }}" > webhook-payload.json
          sig="sha256=$(openssl dgst -sha256 -hmac "$KOMODO_WEBHOOK_AUTH" webhook-payload.json | sed 's/^.*= *//')"
          for url in $KOMODO_WEBHOOK_URL; do
            echo "→ rollback redeploy $url"
            curl -fsSL -X POST "$url" \
              -H 'content-type: application/json' \
              -H 'X-GitHub-Event: push' \
              -H "X-Hub-Signature-256: ${sig}" \
              --data-binary @webhook-payload.json
          done
          echo "::error::deploy rolled back to prior digest after failed health probe"
          exit 1
