# Infra-image CVE scanning (feature 035; always-post required context — feature 039 Workstream C).
# Keyless, fail-closed Trivy sweep over the THIRD-PARTY images we pull but do not build (Keycloak,
# Postgres, Redis, Mongo, Vault, OpenSearch, ClickHouse, LangFuse, Grafana, OPA, Unleash, MinIO,
# Caddy, Mailpit) — the six jumbleknot/* built images are already Trivy-scanned in cd-deploy, so they
# are excluded here (disjoint sets).
#
# The FULL sweep runs WEEKLY (Friday) regardless of what changed — a newly-published advisory can
# render an UNCHANGED pinned image vulnerable, so it cannot be path-gated (same rule as the 033 SCA
# scan). A lighter check also runs on PRs/pushes that touch the infra image references, for fast
# feedback, so weekly is a comfortable safety-net cadence.
#
# feature 039 (Gap 3): `main` branch protection requires the context `infra-image-scan /
# infra-image-scan*`. Previously this workflow triggered ONLY on infra paths, so a PR outside those
# paths (docs/.devcontainer/specs) posted NO status → Forgejo treated the required pattern as
# unsatisfied → the PR was unmergeable via API (405) even fully green, needing an admin override (bit
# PR #67). Fix mirrors app-ci: trigger on EVERY PR (no `pull_request` `paths:`), add an always-running
# `changes` (dorny/paths-filter) job, and keep the required-named `infra-image-scan` job ALWAYS running
# while gating the Trivy STEPS on the filter. So the required context posts `success` on a non-infra PR
# (Trivy steps skipped) and is the real gate when an infra image ref changed. The required-named job
# MUST be the always-run job — a job-level `if:` skip posts nothing in this Forgejo and re-creates Gap 3.
name: infra-image-scan

on:
  schedule:
    # Friday 07:00 UTC ≈ 03:00 America/New_York (EDT, UTC-4) / 02:00 (EST, UTC-5). GitHub/Forgejo
    # Actions cron is UTC-only and does NOT observe DST, so this drifts ±1h across the DST boundary.
    - cron: '0 7 * * 5'
  push:
    # push keeps its paths filter — a non-infra merge to main need not re-scan (the PR already did,
    # and the weekly cron is the safety net). Only the PR trigger must be un-path-gated (branch
    # protection evaluates PR head statuses).
    paths:
      - 'infrastructure-as-code/**'
      - 'scripts/infra-image-scan.mjs'
      - 'scripts/check-infra-image-findings.mjs'
      - 'security/infra-images/**'
      - '.forgejo/workflows/infra-image-scan.yml'
  # NO `paths:` filter — runs on EVERY PR so the required `infra-image-scan / infra-image-scan` context
  # is always posted (success when no infra image ref changed; the real gate when one did). The heavy
  # Trivy work is still gated — by the `changes` job below — so a non-infra PR posts success cheaply.
  pull_request:

concurrency:
  group: infra-image-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Change detection (always runs; gates the Trivy steps below) ────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # PULL REQUESTS ONLY. dorny derives its diff base from the PR event; on any other event it
      # falls back to `github.event.repository.default_branch`, which this Forgejo does NOT put in
      # the payload → the action hard-errors ("requires 'base' input to be configured"). That killed
      # the `changes` job on the WEEKLY CRON, and since infra-image-scan `needs: [changes]` the
      # required job was skipped — i.e. the full weekly sweep, the whole point of the un-path-gated
      # safety net (a new advisory makes an UNCHANGED pinned image vulnerable), silently never ran.
      # (`push` is unaffected — dorny diffs against `event.before` there — but it is filtered out
      # here anyway, and loses nothing: RUN_SCAN already forces every non-PR event through the full
      # sweep.) Skipped → `steps.filter.outputs.infra` is '' → RUN_SCAN falls through to its
      # `github.event_name != 'pull_request'` clause → the sweep runs. Do not drop this `if:`.
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        if: ${{ github.event_name == 'pull_request' }}
        with:
          filters: |
            infra:
              - 'infrastructure-as-code/**'
              - 'scripts/infra-image-scan.mjs'
              - 'scripts/check-infra-image-findings.mjs'
              - 'security/infra-images/**'
              - '.forgejo/workflows/infra-image-scan.yml'

  # ── The required context. ALWAYS runs (no job-level `if:`) so it posts a status on every PR. The
  # Trivy steps are gated on: an infra image ref changed (the PR-only filter) OR any non-PR event
  # (weekly cron + push ALWAYS run the full sweep, un-path-gated, via the
  # `github.event_name != 'pull_request'` clause — dorny's filter is only meaningful for a PR diff and
  # is skipped otherwise). On a non-infra PR every Trivy step skips → the job succeeds → the required
  # context is `success`.
  infra-image-scan:
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # True when Trivy must actually run: an infra image ref changed on a PR/push, OR this is the
      # weekly cron / a push (any non-pull_request event runs the full sweep, un-path-gated).
      RUN_SCAN: ${{ needs.changes.outputs.infra == 'true' || github.event_name != 'pull_request' }}
    steps:
      - name: Checkout
        if: ${{ env.RUN_SCAN == 'true' }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        if: ${{ env.RUN_SCAN == 'true' }}
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        if: ${{ env.RUN_SCAN == 'true' }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Install JS dependencies (the scanner + gate use the `yaml` package)
        if: ${{ env.RUN_SCAN == 'true' }}
        run: pnpm install --frozen-lockfile

      # The kvm runner executes as the unprivileged `ci` user — no sudo / no write to /usr/local/bin.
      # Install Trivy to a user-writable dir and put it on PATH (same as cd-deploy's Trivy step).
      - name: Install Trivy
        if: ${{ env.RUN_SCAN == 'true' }}
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/trivy" --version

      - name: Gate selftest (prove fail/suppress/expiry before the real scan)
        if: ${{ env.RUN_SCAN == 'true' }}
        run: node scripts/check-infra-image-findings.mjs --selftest

      # Enumerate the third-party infra images → Trivy each → normalized findings.json. Fail-closed:
      # a Trivy/pull/parse failure exits non-zero and fails the job (never a clean report on failure).
      - name: Scan infra images (Trivy)
        if: ${{ env.RUN_SCAN == 'true' }}
        run: node scripts/infra-image-scan.mjs --emit-allowlist

      - name: Gate — fail on any un-allowlisted fixable High/Critical
        if: ${{ env.RUN_SCAN == 'true' }}
        run: node scripts/check-infra-image-findings.mjs

      - name: Upload scan report (findings.json + summary + proposed allowlist + raw Trivy)
        if: ${{ env.RUN_SCAN == 'true' && always() }}
        uses: actions/upload-artifact@ff15f0306b3f739f7b6fd43fb5d26cd321bd4de5 # v3
        with:
          name: infra-image-scan-report
          path: security/infra-images/reports/

      # When no infra image ref changed on a PR, every step above skips and the job succeeds → the
      # required `infra-image-scan / infra-image-scan` context is posted as success, so the PR merges
      # without an admin override (feature 039 AC6). This line makes the skip explicit in the log.
      - name: No infra image ref changed — required context satisfied (scan skipped)
        if: ${{ env.RUN_SCAN != 'true' }}
        run: echo "No infra image reference changed on this PR; Trivy scan skipped, required context = success."
